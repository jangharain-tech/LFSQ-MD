<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Team Meeting</title>
<style>
  :root{
    --black:#0d0d0d;
    --green:#3ec853;
    --gray-bg:#f1f1f1;
    --line-blue:#2d6079;
    --text-dark:#1a1a1a;
    --text-mid:#666;
    --white:#ffffff;
    --radius:0px;
    --gap:18px;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:#e7e7e7;
    color:var(--text-dark);
    padding-bottom:80px;
  }

  /* ===== Header ===== */
  header.top{
    background:var(--black);
    color:var(--white);
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  header.top h1{
    margin:0;
    font-size:26px;
    font-weight:600;
    letter-spacing:0.5px;
  }
  .meeting-date-bar{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .meeting-date-bar .label{
    font-size:13px;
    color:#aaa;
    font-weight:600;
  }
  .meeting-date-bar .date-display{
    font-size:16px;
    font-weight:700;
    color:#fff;
    min-width:110px;
    text-align:center;
  }
  .meeting-date-bar button{
    background:transparent;
    border:1px solid #555;
    color:#ddd;
    width:30px;
    height:30px;
    font-size:13px;
    border-radius:4px;
    cursor:pointer;
    transition:.15s;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1;
  }
  .meeting-date-bar button:hover{
    background:var(--green);
    border-color:var(--green);
    color:#0d0d0d;
  }
  .meeting-date-bar button:disabled{
    opacity:.3;
    cursor:default;
  }
  .meeting-date-bar button:disabled:hover{
    background:transparent;
    border-color:#555;
    color:#ddd;
  }
  .meeting-date-bar button.add-date{
    font-weight:700;
    font-size:16px;
  }
  .meeting-date-bar button.del-date:hover{
    background:#e25555;
    border-color:#e25555;
    color:#fff;
  }


  /* ===== Top section: Year notice + Calendar ===== */
  .top-section{
    display:grid;
    grid-template-columns: 1.6fr 1fr;
    gap:0;
    background:var(--black);
  }
  @media (max-width: 900px){
    .top-section{grid-template-columns: 1fr;}
  }

  .notice-board{
    background:var(--gray-bg);
    padding:24px 28px;
  }
  .notice-board .year-label{
    font-size:24px;
    font-weight:700;
    margin:0 0 18px 0;
  }
  .notice-line{
    display:flex;
    align-items:baseline;
    gap:10px;
    border-bottom:1.5px solid var(--line-blue);
    padding:8px 2px;
  }
  .notice-line input{
    flex:1;
    border:none;
    background:transparent;
    font-size:15px;
    font-weight:700;
    font-family:inherit;
    color:var(--text-dark);
    padding:4px 2px;
  }
  .notice-line input::placeholder{
    color:#aaa;
    font-weight:600;
  }
  .notice-line input:focus{outline:none;}
  .notice-line.empty input{font-weight:400;}
  .notice-add{
    margin-top:10px;
    background:none;
    border:1px dashed #999;
    color:#777;
    padding:8px;
    width:100%;
    cursor:pointer;
    border-radius:4px;
    font-size:13px;
  }
  .notice-add:hover{border-color:var(--line-blue); color:var(--line-blue);}

  .calendar-panel{
    background:#3a3a3a;
    color:#f1f1f1;
    padding:24px 28px;
    display:flex;
    flex-direction:column;
  }
  .calendar-panel h2{
    margin:0 0 4px 0;
    font-size:20px;
    text-align:center;
    color:#fff;
  }
  .calendar-panel .desc{
    text-align:center;
    font-size:13px;
    opacity:.7;
    margin-bottom:18px;
  }
  #cal-month-label{
    color:#fff;
  }
  .cal-grid{
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap:4px;
    font-size:12px;
    margin-bottom:14px;
  }
  .cal-grid .dow{
    text-align:center;
    font-weight:700;
    padding:4px 0;
    opacity:.6;
    color:#fff;
  }
  .cal-day{
    background:#4d4d4d;
    border-radius:4px;
    min-height:46px;
    padding:3px 4px;
    font-size:11px;
    position:relative;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:2px;
    color:#fff;
    overflow:visible;
  }
  .cal-day.empty{background:transparent; cursor:default;}
  .cal-day .num{font-weight:700;}
  .cal-day .tag{
    color:#fff;
    border-radius:3px;
    padding:1px 4px;
    font-size:9px;
    line-height:1.4;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    position:relative;
    z-index:1;
  }
  .cal-day .tag.range-start{border-radius:3px 0 0 3px; margin-right:-4px;}
  .cal-day .tag.range-end{border-radius:0 3px 3px 0; margin-left:-4px;}
  .cal-day .tag.range-mid{border-radius:0; margin-left:-4px; margin-right:-4px;}
  .cal-day .tag.range-single{border-radius:3px;}
  .cal-day .tag.vacation{background:#5b8ad1;}
  .cal-day .tag.meeting{background:#d18a4d;}
  .cal-legend{
    display:flex;
    gap:14px;
    justify-content:center;
    font-size:12px;
    margin-top:auto;
    padding-top:10px;
    color:#ddd;
  }
  .cal-legend span{display:flex; align-items:center; gap:5px;}
  .legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;}
  .legend-dot.vacation{background:#5b8ad1;}
  .legend-dot.meeting{background:#d18a4d;}

  /* ===== Member board ===== */
  #member-list{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:0;
  }
  @media (max-width: 900px){
    #member-list{grid-template-columns: 1fr;}
  }
  .member-card{
    background:var(--white);
    border-bottom:6px solid var(--black);
    border-right:6px solid var(--black);
    padding:26px 28px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  #member-list .member-card:nth-child(2n){
    border-right:none;
  }
  @media (max-width: 900px){
    .member-card{border-right:none;}
  }
  .member-card-body{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
  }

  .member-side{
    width:190px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .member-id-row{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:var(--white);
    border:1.5px solid #ccc;
    color:#999;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:11px;
    line-height:1.4;
    flex-shrink:0;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    padding:0;
  }
  .avatar img{
    width:100%;height:100%;object-fit:cover;
  }
  .avatar input[type=file]{display:none;}
  .member-name{
    font-size:22px;
    font-weight:800;
    border:none;
    background:transparent;
    font-family:inherit;
    width:100%;
    color:var(--text-dark);
  }
  .member-name:focus{outline:none; border-bottom:1.5px solid var(--line-blue);}

  .mission-block{
    border:1px solid #ccc;
    padding:12px;
  }
  .mission-block h4{
    margin:0 0 8px 0;
    font-size:15px;
    font-weight:700;
  }
  .mission-month{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    font-size:12px;
    font-weight:700;
    margin-bottom:8px;
  }
  .mission-month .month-label-wrap{
    display:flex;
    align-items:center;
    gap:4px;
  }
  .mission-month .month-text{
    font-size:12px;
    font-weight:700;
  }
  .mission-month .nav-btn{
    border:none;
    background:#eee;
    width:20px;
    height:20px;
    border-radius:3px;
    cursor:pointer;
    font-size:11px;
    line-height:1;
    color:#555;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .mission-month .nav-btn:hover{background:var(--green); color:#0d0d0d;}
  .mission-month .nav-btn:disabled{opacity:.35; cursor:default;}
  .mission-month .nav-btn:disabled:hover{background:#eee; color:#555;}
  .mission-item{
    border-bottom:1px solid #999;
    padding:6px 2px;
    margin-bottom:4px;
  }
  .mission-item input{
    border:none;
    background:transparent;
    width:100%;
    font-size:13px;
    font-family:inherit;
  }
  .mission-item input:focus{outline:none;}
  .small-add{
    background:none;
    border:1px dashed #bbb;
    color:#999;
    width:100%;
    padding:5px;
    font-size:12px;
    cursor:pointer;
    border-radius:3px;
    margin-top:4px;
  }
  .small-add:hover{border-color:var(--line-blue); color:var(--line-blue);}
  .block-save{
    margin-top:8px;
    background:var(--black);
    border:1px solid var(--black);
    color:#fff;
    width:100%;
    padding:7px;
    font-size:12px;
    cursor:pointer;
    border-radius:3px;
    font-weight:700;
  }
  .block-save:hover{background:var(--green); border-color:var(--green); color:#0d0d0d;}

  /* ===== Weekly share box ===== */
  .weekly-box{
    flex:1;
    min-width:240px;
    border:1.5px solid var(--black);
    padding:20px 22px;
    position:relative;
  }
  /* speech-bubble pointer */
  .member-side{position:relative;}
  .weekly-box::before{
    content:"";
    position:absolute;
    left:-22px;
    top:54px;
    width:0;height:0;
    border-top:14px solid transparent;
    border-bottom:14px solid transparent;
    border-right:14px solid var(--black);
  }
  .weekly-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:16px;
    flex-wrap:wrap;
    gap:8px;
  }
  .weekly-header h3{
    margin:0;
    font-size:24px;
    font-weight:800;
  }
  .weekly-header .weekly-date{
    font-size:13px;
    font-weight:700;
    text-align:right;
    color:var(--text-dark);
  }
  .weekly-line{
    border-bottom:1.5px solid var(--line-blue);
    padding:9px 2px;
    margin-bottom:2px;
  }
  .weekly-line input{
    border:none;
    background:transparent;
    width:100%;
    font-size:14px;
    font-family:inherit;
    color:var(--text-dark);
    padding:2px;
  }
  .weekly-line input:focus{outline:none;}
  .weekly-line.bold input{font-weight:700;}
  .weekly-add{
    margin-top:8px;
    background:none;
    border:1px dashed #ccc;
    color:#999;
    padding:6px;
    width:100%;
    cursor:pointer;
    border-radius:3px;
    font-size:12px;
  }
  .weekly-add:hover{border-color:var(--line-blue); color:var(--line-blue);}

  /* ===== Member card controls (move/delete) ===== */
  .card-controls{
    display:flex;
    flex-direction:row;
    gap:6px;
    justify-content:flex-end;
  }
  .card-controls button{
    background:#f1f1f1;
    border:1px solid #ccc;
    width:30px;
    height:30px;
    cursor:pointer;
    font-size:14px;
    border-radius:4px;
    line-height:1;
    color:#555;
  }
  .card-controls button:hover{
    background:var(--green);
    border-color:var(--green);
    color:#0d0d0d;
  }
  .card-controls button.danger:hover{
    background:#e25555;
    border-color:#e25555;
    color:#fff;
  }

  /* ===== Add member ===== */
  .add-member-bar{
    background:var(--gray-bg);
    text-align:center;
    padding:30px;
    border-top:6px solid var(--black);
    cursor:pointer;
  }
  .add-member-bar span{
    font-size:30px;
    color:#999;
    font-weight:300;
    letter-spacing:2px;
    transition:.15s;
  }
  .add-member-bar:hover span{color:var(--line-blue);}

  /* ===== Save status ===== */
  .save-status{
    position:fixed;
    bottom:18px;
    right:18px;
    background:var(--black);
    color:#fff;
    padding:10px 18px;
    border-radius:30px;
    font-size:13px;
    opacity:0;
    transition:opacity .3s;
    z-index:50;
  }
  .save-status.show{opacity:1;}

  /* ===== Day editor modal ===== */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:#fff;
    width:320px;
    padding:22px;
    border-radius:6px;
  }
  .modal-box h3{margin:0 0 14px 0; font-size:16px;}
  .modal-row{margin-bottom:12px;}
  .modal-row label{font-size:12px; font-weight:700; display:block; margin-bottom:4px;}
  .modal-row input, .modal-row select{
    width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; font-family:inherit; font-size:13px;
  }
  .modal-row-pair{
    display:flex; gap:10px; margin-bottom:12px;
  }
  .modal-row-pair .modal-row{
    flex:1; margin-bottom:0;
  }
  .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:16px;}
  .modal-actions button{
    padding:8px 14px; border-radius:4px; border:1px solid #ccc; background:#fff; cursor:pointer; font-size:13px;
  }
  .modal-actions button.primary{background:var(--black); color:#fff; border-color:var(--black);}
  .modal-tag-list{display:flex; flex-direction:column; gap:6px; margin-bottom:10px;}
  .modal-tag-list .existing-tag{
    display:flex; align-items:center; gap:6px; font-size:12px; background:#f5f5f5; padding:6px 8px; border-radius:4px;
  }
  .modal-tag-list .existing-tag .x{cursor:pointer; color:#c00; font-weight:700;}
</style>
</head>
<body>

<header class="top">
  <h1>MD Team Meeting</h1>
  <div class="meeting-date-bar">
    <span class="label">미팅 기준일</span>
    <button id="meet-prev" class="nav-date" title="이전 미팅일">◀</button>
    <span class="date-display" id="meet-date-display">-</span>
    <button id="meet-next" class="nav-date" title="다음 미팅일">▶</button>
    <button id="meet-add" class="add-date" title="새 미팅일 추가">+</button>
    <button id="meet-del" class="del-date" title="현재 미팅일 삭제">✕</button>
  </div>
</header>

<section class="top-section">
  <div class="notice-board">
    <p class="year-label" id="year-label" contenteditable="true">&lt; 2026Y &gt;</p>
    <div id="notice-lines"></div>
    <button class="notice-add" id="add-notice">+ 항목 추가</button>
  </div>

  <div class="calendar-panel">
    <h2>캘린더</h2>
    <p class="desc">휴가 및 이슈 체크 가능한 캘린더 기능</p>
    <div id="cal-month-label" style="text-align:center;font-weight:700;margin-bottom:8px;"></div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend">
      <span><i class="legend-dot vacation"></i> 휴가</span>
      <span><i class="legend-dot meeting"></i> 주요 회의</span>
    </div>
  </div>
</section>

<div id="member-list"></div>

<div class="add-member-bar" id="add-member">
  <span>(+) ADD MEMBER</span>
</div>

<div class="save-status" id="save-status">저장됨</div>

<!-- Day edit modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-date-title">일정 추가</h3>
    <div class="modal-tag-list" id="modal-existing"></div>
    <div class="modal-row">
      <label>이름 / 내용</label>
      <input type="text" id="modal-input-text" placeholder="예: 홍길동 휴가, 분기 회의">
    </div>
    <div class="modal-row-pair">
      <div class="modal-row">
        <label>시작일</label>
        <input type="date" id="modal-input-start">
      </div>
      <div class="modal-row">
        <label>종료일</label>
        <input type="date" id="modal-input-end">
      </div>
    </div>
    <div class="modal-row">
      <label>종류</label>
      <select id="modal-input-type">
        <option value="vacation">휴가</option>
        <option value="meeting">주요 회의</option>
      </select>
    </div>
    <div class="modal-actions">
      <button id="modal-close">닫기</button>
      <button class="primary" id="modal-add">추가</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   MD Team Meeting - Frontend logic
   -----------------------------------------------------
   데이터 저장 구조 (DATA 객체)를 JSON으로 직렬화하여
   Google Apps Script Web App(GAS)에 전송/조회합니다.

   ===== 연동 방법 (Google Apps Script) =====
   1) Google Sheets 새 시트 생성 (예: "MD_Meeting_DB")
   2) 확장프로그램 > Apps Script 에서 아래와 같은 doGet/doPost 함수를 작성
      - doGet(): 시트의 JSON 데이터를 반환
      - doPost(e): e.postData.contents (JSON 문자열)을 시트에 저장
   3) 배포 > 새 배포 > 웹앱으로 배포 (액세스 권한: 모든 사용자)
   4) 발급된 웹앱 URL을 아래 SCRIPT_URL 에 붙여넣기
   5) 이미지 업로드는 Drive API(또는 GAS의 DriveApp)를 통해
      base64로 전송 -> Drive에 저장 -> 공개 URL 반환하는 방식으로 확장 가능
   ========================================================= */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTtJMe_Mqn1FV5NhKxndZn_SRAEmFwVK9lLkwXDildAYrcHC9gN_N9CB0OFdLideMHfg/exec";

// ---------- 기본 데이터 구조 ----------
let DATA = {
  year: "< 2026Y >",
  notices: [
    {text:""},
    {text:""}
  ],
  calendar: {
    monthLabel: "2026.06",
    events: []
    // {id, type:"vacation"|"meeting", text:"홍길동 휴가", start:"2026-06-15", end:"2026-06-19"}
  },
  // ===== 전역 미팅 기준일 =====
  meetingDates: ["2026.06.16"],
  currentMeetingDate: "2026.06.16",
  members: [
    {
      id: "m1",
      name: "홍길동",
      avatar: "",
      // Monthly Mission: 월별 아카이브
      missionCurrentMonth: "2026.06",
      missionArchive: {
        "2026.05": ["", ""],
        "2026.06": ["", ""]
      },
      // Weekly Share: 미팅 기준일별 아카이브
      weeklyArchive: {
        "2026.06.16": ["", "", "", "", ""]
      }
    },
    {
      id: "m2",
      name: "홍길동",
      avatar: "",
      missionCurrentMonth: "2026.06",
      missionArchive: {
        "2026.05": ["", ""],
        "2026.06": ["", ""]
      },
      weeklyArchive: {
        "2026.06.16": ["", "", "", "", ""]
      }
    }
  ]
};

// ---------- 유틸: YYYY.MM 월 이동 ----------
function shiftMonth(yyyymm, delta){
  const [y, m] = yyyymm.split(".").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ---------- 유틸: YYYY.MM.DD 날짜 비교/정렬 ----------
function dateKeyToSortable(str){
  return str.replace(/\./g, "");
}
function getSortedMeetingDates(){
  return [...DATA.meetingDates].sort((a,b)=>{
    return dateKeyToSortable(a).localeCompare(dateKeyToSortable(b));
  });
}

// ---------- 마이그레이션: 옛 구조 -> 새 구조 ----------
function migrateData(json){
  if(!json || !json.members) return json;

  const allDateKeys = new Set();

  json.members.forEach(member=>{
    // 옛 Monthly Mission 구조 (missionMonth / missions) -> missionArchive
    if(member.missionArchive === undefined){
      const month = member.missionMonth || "2026.06";
      member.missionCurrentMonth = month;
      member.missionArchive = {
        [month]: member.missions || ["", ""]
      };
      delete member.missionMonth;
      delete member.missions;
    }
    if(member.missionCurrentMonth === undefined){
      member.missionCurrentMonth = Object.keys(member.missionArchive)[0] || "2026.06";
    }

    // 옛 Weekly Share 구조 (weeklyDate / weeklyItems) -> weeklyArchive
    if(member.weeklyArchive === undefined){
      const date = member.weeklyDate || member.weeklyCurrentDate || "2026.06.16";
      member.weeklyArchive = {
        [date]: member.weeklyItems || ["", "", "", "", ""]
      };
      delete member.weeklyDate;
      delete member.weeklyItems;
    }
    // 멤버별 weeklyCurrentDate는 더 이상 사용하지 않음 (전역 currentMeetingDate로 통합)
    delete member.weeklyCurrentDate;

    Object.keys(member.weeklyArchive).forEach(d=>allDateKeys.add(d));
  });

  // 전역 미팅 기준일 목록 생성/보강
  if(!Array.isArray(json.meetingDates)){
    json.meetingDates = [];
  }
  allDateKeys.forEach(d=>{
    if(!json.meetingDates.includes(d)) json.meetingDates.push(d);
  });
  if(json.meetingDates.length === 0){
    json.meetingDates.push("2026.06.16");
  }
  json.meetingDates.sort((a,b)=> dateKeyToSortable(a).localeCompare(dateKeyToSortable(b)));

  if(!json.currentMeetingDate || !json.meetingDates.includes(json.currentMeetingDate)){
    json.currentMeetingDate = json.meetingDates[json.meetingDates.length-1];
  }

  // 모든 멤버에게 현재 미팅일 키가 없으면 빈 항목 생성
  json.members.forEach(member=>{
    json.meetingDates.forEach(d=>{
      if(!member.weeklyArchive[d]){
        member.weeklyArchive[d] = ["", "", "", "", ""];
      }
    });
  });

  // 옛 캘린더 이벤트 구조 (날짜키 객체) -> 범위 이벤트 배열
  if(json.calendar && json.calendar.events && !Array.isArray(json.calendar.events)){
    const oldEvents = json.calendar.events;
    const newEvents = [];
    Object.keys(oldEvents).forEach(dateKey=>{
      (oldEvents[dateKey] || []).forEach(ev=>{
        newEvents.push({
          id: "ev" + Date.now() + Math.random().toString(16).slice(2),
          type: ev.type,
          text: ev.text,
          start: dateKey,
          end: dateKey
        });
      });
    });
    json.calendar.events = newEvents;
  }
  if(!json.calendar) json.calendar = { monthLabel:"2026.06", events: [] };
  if(!json.calendar.events) json.calendar.events = [];

  return json;
}
async function loadData(){
  // GAS 연동 전: 로컬 메모리의 기본값 사용
  if(SCRIPT_URL.startsWith("YOUR_")){
    render();
    return;
  }
  try{
    const res = await fetch(SCRIPT_URL);
    const json = await res.json();
    if(json && json.members){
      DATA = migrateData(json);
      // 마이그레이션된 구조를 다시 저장해 다음부터는 변환 불필요
      saveData();
    }
  }catch(err){
    console.error("불러오기 실패:", err);
  }
  render();
}

// ---------- 저장 ----------
async function saveData(){
  showSaveStatus("저장 중...");
  if(SCRIPT_URL.startsWith("YOUR_")){
    // GAS 미연동 상태 - 콘솔에만 출력 (실제 운영시 위 SCRIPT_URL 설정 필요)
    console.log("SAVE (local only):", DATA);
    setTimeout(()=>showSaveStatus("저장됨 (로컬, GAS 미연동)"), 300);
    return;
  }
  try{
    await fetch(SCRIPT_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(DATA)
    });
    showSaveStatus("저장됨");
  }catch(err){
    console.error("저장 실패:", err);
    showSaveStatus("저장 실패");
  }
}

function showSaveStatus(msg){
  const el = document.getElementById("save-status");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 1800);
}

// 자동 저장 (입력 후 일정 시간 뒤)
let saveTimer = null;
function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 800);
}

// ---------- 렌더링 ----------

// --- Calendar ---
let calCurrentDate = new Date(2026, 5, 1); // 2026-06

function renderCalendar(){
  const label = document.getElementById("cal-month-label");
  const y = calCurrentDate.getFullYear();
  const m = calCurrentDate.getMonth(); // 0-based
  label.textContent = `${y}.${String(m+1).padStart(2,'0')}`;

  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";

  const dows = ["일","월","화","수","목","금","토"];
  dows.forEach(d=>{
    const el = document.createElement("div");
    el.className = "dow";
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m+1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    const el = document.createElement("div");
    el.className = "cal-day empty";
    grid.appendChild(el);
  }

  for(let d=1; d<=lastDate; d++){
    const dateKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = (firstDay + (d-1)) % 7; // 0=일 ... 6=토, 이 셀의 요일 위치
    const cell = document.createElement("div");
    cell.className = "cal-day";
    cell.dataset.date = dateKey;

    const num = document.createElement("div");
    num.className = "num";
    num.textContent = d;
    cell.appendChild(num);

    const events = getEventsForDate(dateKey);
    events.forEach(ev=>{
      const tag = document.createElement("div");
      const isStartOfRange = ev.start === dateKey;
      const isEndOfRange = ev.end === dateKey;
      // 주(week)가 바뀌면 이어붙이지 않고 그 줄의 시작/끝으로 처리
      const isRowStart = isStartOfRange || dow === 0;
      const isRowEnd = isEndOfRange || dow === 6;

      let posClass;
      if(isRowStart && isRowEnd) posClass = "range-single";
      else if(isRowStart) posClass = "range-start";
      else if(isRowEnd) posClass = "range-end";
      else posClass = "range-mid";

      tag.className = "tag " + (ev.type === "meeting" ? "meeting" : "vacation") + " " + posClass;
      // 텍스트는 범위 시작일(또는 그 줄의 첫 칸)에만 표시
      tag.textContent = (isStartOfRange || dow === 0) ? ev.text : "\u00A0";
      cell.appendChild(tag);
    });

    cell.addEventListener("click", ()=>openDayModal(dateKey));
    grid.appendChild(cell);
  }
}

// 특정 날짜(YYYY-MM-DD)가 포함된 이벤트 목록 반환 (시작일 기준 정렬)
function getEventsForDate(dateKey){
  return DATA.calendar.events
    .filter(ev => ev.start <= dateKey && dateKey <= ev.end)
    .sort((a,b)=> a.start.localeCompare(b.start));
}

// --- Day modal ---
let modalDateKey = null;
function openDayModal(dateKey){
  modalDateKey = dateKey;
  document.getElementById("modal-date-title").textContent = dateKey + " 일정";
  document.getElementById("modal-input-text").value = "";
  document.getElementById("modal-input-type").value = "vacation";
  document.getElementById("modal-input-start").value = dateKey;
  document.getElementById("modal-input-end").value = dateKey;

  const existingWrap = document.getElementById("modal-existing");
  existingWrap.innerHTML = "";
  const events = getEventsForDate(dateKey);

  if(events.length === 0){
    const empty = document.createElement("div");
    empty.style.fontSize = "12px";
    empty.style.color = "#999";
    empty.textContent = "등록된 일정이 없습니다.";
    existingWrap.appendChild(empty);
  }

  events.forEach((ev)=>{
    const row = document.createElement("div");
    row.className = "existing-tag";
    const rangeLabel = ev.start === ev.end ? ev.start : `${ev.start} ~ ${ev.end}`;
    row.innerHTML = `<span>${ev.type === "meeting" ? "🟧 회의" : "🟦 휴가"} - ${escapeHtml(ev.text)} (${rangeLabel})</span>`;
    const x = document.createElement("span");
    x.className = "x";
    x.textContent = "✕";
    x.addEventListener("click", ()=>{
      const realIdx = DATA.calendar.events.indexOf(ev);
      if(realIdx > -1) DATA.calendar.events.splice(realIdx,1);
      openDayModal(dateKey);
      renderCalendar();
      scheduleSave();
    });
    row.appendChild(x);
    existingWrap.appendChild(row);
  });

  document.getElementById("modal-overlay").classList.add("show");
}
function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
document.getElementById("modal-close").addEventListener("click", ()=>{
  document.getElementById("modal-overlay").classList.remove("show");
});
document.getElementById("modal-add").addEventListener("click", ()=>{
  const text = document.getElementById("modal-input-text").value.trim();
  const type = document.getElementById("modal-input-type").value;
  let start = document.getElementById("modal-input-start").value;
  let end = document.getElementById("modal-input-end").value;
  if(!text) return;
  if(!start) start = modalDateKey;
  if(!end) end = start;
  if(end < start){ [start, end] = [end, start]; } // 역순 입력 시 자동 보정

  DATA.calendar.events.push({
    id: "ev" + Date.now(),
    type,
    text,
    start,
    end
  });
  document.getElementById("modal-overlay").classList.remove("show");
  renderCalendar();
  scheduleSave();
});

function renderMembers(){
  const list = document.getElementById("member-list");
  list.innerHTML = "";

  DATA.members.forEach((member, idx)=>{
    const card = document.createElement("div");
    card.className = "member-card";

    const body = document.createElement("div");
    body.className = "member-card-body";

    // ===== Left side =====
    const side = document.createElement("div");
    side.className = "member-side";

    const idRow = document.createElement("div");
    idRow.className = "member-id-row";

    // avatar
    const avatarLabel = document.createElement("label");
    avatarLabel.className = "avatar";
    if(member.avatar){
      avatarLabel.innerHTML = `<img src="${member.avatar}" alt="사진">`;
    }else{
      avatarLabel.innerHTML = `<span>사진</span>`;
    }
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        member.avatar = ev.target.result; // base64 (운영시 Drive 업로드 후 URL 교체 권장)
        avatarLabel.innerHTML = `<img src="${member.avatar}" alt="사진">`;
        avatarLabel.appendChild(fileInput);
        scheduleSave();
      };
      reader.readAsDataURL(file);
    });
    avatarLabel.appendChild(fileInput);
    idRow.appendChild(avatarLabel);

    // name
    const nameInput = document.createElement("input");
    nameInput.className = "member-name";
    nameInput.type = "text";
    nameInput.value = member.name;
    nameInput.addEventListener("input", ()=>{
      member.name = nameInput.value;
      scheduleSave();
    });
    idRow.appendChild(nameInput);

    side.appendChild(idRow);

    // mission block
    const missionBlock = document.createElement("div");
    missionBlock.className = "mission-block";
    const missionTitle = document.createElement("h4");
    missionTitle.textContent = "Monthly Mission";
    missionBlock.appendChild(missionTitle);

    // 현재 월에 아카이브가 없으면 생성
    if(!member.missionArchive[member.missionCurrentMonth]){
      member.missionArchive[member.missionCurrentMonth] = ["", ""];
    }
    const currentMissions = member.missionArchive[member.missionCurrentMonth];

    const monthRow = document.createElement("div");
    monthRow.className = "mission-month";

    const labelWrap = document.createElement("div");
    labelWrap.className = "month-label-wrap";

    const prevBtn = document.createElement("button");
    prevBtn.className = "nav-btn";
    prevBtn.textContent = "◀";
    prevBtn.title = "전월";
    prevBtn.addEventListener("click", ()=>{
      member.missionCurrentMonth = shiftMonth(member.missionCurrentMonth, -1);
      renderMembers();
    });
    labelWrap.appendChild(prevBtn);

    const monthText = document.createElement("span");
    monthText.className = "month-text";
    monthText.textContent = `< ${member.missionCurrentMonth} >`;
    labelWrap.appendChild(monthText);

    const nextBtn = document.createElement("button");
    nextBtn.className = "nav-btn";
    nextBtn.textContent = "▶";
    nextBtn.title = "익월";
    nextBtn.addEventListener("click", ()=>{
      member.missionCurrentMonth = shiftMonth(member.missionCurrentMonth, 1);
      renderMembers();
    });
    labelWrap.appendChild(nextBtn);

    monthRow.appendChild(labelWrap);
    missionBlock.appendChild(monthRow);

    currentMissions.forEach((m, mIdx)=>{
      const item = document.createElement("div");
      item.className = "mission-item";
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "TEXT TEXT TEXT";
      input.value = m;
      input.addEventListener("input", ()=>{
        currentMissions[mIdx] = input.value;
      });
      item.appendChild(input);
      missionBlock.appendChild(item);
    });
    const missionAdd = document.createElement("button");
    missionAdd.className = "small-add";
    missionAdd.textContent = "+ 미션 추가";
    missionAdd.addEventListener("click", ()=>{
      currentMissions.push("");
      renderMembers();
    });
    missionBlock.appendChild(missionAdd);

    const missionSave = document.createElement("button");
    missionSave.className = "block-save";
    missionSave.textContent = "내용 저장";
    missionSave.addEventListener("click", ()=>{
      saveData();
    });
    missionBlock.appendChild(missionSave);

    side.appendChild(missionBlock);
    body.appendChild(side);

    // ===== Weekly box =====
    const weekly = document.createElement("div");
    weekly.className = "weekly-box";

    const header = document.createElement("div");
    header.className = "weekly-header";
    const h3 = document.createElement("h3");
    h3.textContent = "Weekly Share";
    header.appendChild(h3);

    // 현재 미팅 기준일에 아카이브가 없으면 생성
    if(!member.weeklyArchive[DATA.currentMeetingDate]){
      member.weeklyArchive[DATA.currentMeetingDate] = ["", "", "", "", ""];
    }
    const currentWeeklyItems = member.weeklyArchive[DATA.currentMeetingDate];

    const dateLabel = document.createElement("span");
    dateLabel.className = "weekly-date";
    dateLabel.style.fontSize = "13px";
    dateLabel.style.fontWeight = "700";
    dateLabel.textContent = `< ${DATA.currentMeetingDate} >`;
    header.appendChild(dateLabel);

    weekly.appendChild(header);

    currentWeeklyItems.forEach((w, wIdx)=>{
      const line = document.createElement("div");
      line.className = "weekly-line" + (wIdx === 0 ? " bold" : "");
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "TEXT TEXT TEXT";
      input.value = w;
      input.addEventListener("input", ()=>{
        currentWeeklyItems[wIdx] = input.value;
      });
      line.appendChild(input);
      weekly.appendChild(line);
    });
    const weeklyAdd = document.createElement("button");
    weeklyAdd.className = "weekly-add";
    weeklyAdd.textContent = "+ 줄 추가";
    weeklyAdd.addEventListener("click", ()=>{
      currentWeeklyItems.push("");
      renderMembers();
    });
    weekly.appendChild(weeklyAdd);

    const weeklySave = document.createElement("button");
    weeklySave.className = "block-save";
    weeklySave.textContent = "내용 저장";
    weeklySave.addEventListener("click", ()=>{
      saveData();
    });
    weekly.appendChild(weeklySave);

    body.appendChild(weekly);
    card.appendChild(body);

    // ===== Controls (move up/down, delete) =====
    const controls = document.createElement("div");
    controls.className = "card-controls";

    const upBtn = document.createElement("button");
    upBtn.textContent = "▲";
    upBtn.title = "위로 이동";
    upBtn.disabled = idx === 0;
    upBtn.addEventListener("click", ()=>{
      if(idx === 0) return;
      [DATA.members[idx-1], DATA.members[idx]] = [DATA.members[idx], DATA.members[idx-1]];
      renderMembers();
      scheduleSave();
    });
    controls.appendChild(upBtn);

    const downBtn = document.createElement("button");
    downBtn.textContent = "▼";
    downBtn.title = "아래로 이동";
    downBtn.disabled = idx === DATA.members.length-1;
    downBtn.addEventListener("click", ()=>{
      if(idx === DATA.members.length-1) return;
      [DATA.members[idx+1], DATA.members[idx]] = [DATA.members[idx], DATA.members[idx+1]];
      renderMembers();
      scheduleSave();
    });
    controls.appendChild(downBtn);

    const delBtn = document.createElement("button");
    delBtn.textContent = "✕";
    delBtn.title = "삭제";
    delBtn.className = "danger";
    delBtn.addEventListener("click", ()=>{
      if(!confirm(`${member.name} 카드를 삭제할까요?`)) return;
      DATA.members.splice(idx,1);
      renderMembers();
      scheduleSave();
    });
    controls.appendChild(delBtn);

    card.appendChild(controls);

    list.appendChild(card);
  });
}

// --- 미팅 기준일 컨트롤 ---
function renderMeetingDateBar(){
  const display = document.getElementById("meet-date-display");
  const prevBtn = document.getElementById("meet-prev");
  const nextBtn = document.getElementById("meet-next");
  const delBtn = document.getElementById("meet-del");

  const sorted = getSortedMeetingDates();
  const curIdx = sorted.indexOf(DATA.currentMeetingDate);

  display.textContent = `< ${DATA.currentMeetingDate} >`;
  prevBtn.disabled = curIdx <= 0;
  nextBtn.disabled = curIdx >= sorted.length - 1;
  delBtn.disabled = sorted.length <= 1;
}

document.getElementById("meet-prev").addEventListener("click", ()=>{
  const sorted = getSortedMeetingDates();
  const curIdx = sorted.indexOf(DATA.currentMeetingDate);
  if(curIdx > 0){
    DATA.currentMeetingDate = sorted[curIdx-1];
    render();
  }
});

document.getElementById("meet-next").addEventListener("click", ()=>{
  const sorted = getSortedMeetingDates();
  const curIdx = sorted.indexOf(DATA.currentMeetingDate);
  if(curIdx < sorted.length-1){
    DATA.currentMeetingDate = sorted[curIdx+1];
    render();
  }
});

document.getElementById("meet-add").addEventListener("click", ()=>{
  const today = new Date();
  const defaultDate = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  const input = prompt("새 미팅 기준일을 입력하세요 (예: 2026.06.23)", defaultDate);
  if(!input) return;
  const trimmed = input.trim();
  if(!/^\d{4}\.\d{2}\.\d{2}$/.test(trimmed)){
    alert("형식이 올바르지 않습니다. 예: 2026.06.23");
    return;
  }
  if(!DATA.meetingDates.includes(trimmed)){
    DATA.meetingDates.push(trimmed);
  }
  // 모든 멤버에 해당 날짜의 빈 Weekly Share 항목 생성
  DATA.members.forEach(member=>{
    if(!member.weeklyArchive[trimmed]){
      member.weeklyArchive[trimmed] = ["", "", "", "", ""];
    }
  });
  DATA.currentMeetingDate = trimmed;
  render();
  scheduleSave();
});

document.getElementById("meet-del").addEventListener("click", ()=>{
  const sorted = getSortedMeetingDates();
  if(sorted.length <= 1) return;
  if(!confirm(`미팅 기준일 ${DATA.currentMeetingDate} 을(를) 삭제할까요?\n모든 멤버의 해당 날짜 Weekly Share 내용도 삭제됩니다.`)) return;

  const target = DATA.currentMeetingDate;
  DATA.meetingDates = DATA.meetingDates.filter(d=>d !== target);
  DATA.members.forEach(member=>{
    delete member.weeklyArchive[target];
  });

  const newSorted = getSortedMeetingDates();
  DATA.currentMeetingDate = newSorted[newSorted.length-1];

  render();
  scheduleSave();
});
