<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Team Meeting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
  :root{
    /* ===== 키컬러 ===== */
    --ink:#2b2d3a;        /* 1. 잉크 네이비 - 헤더/이름탭/구조적 요소 */
    --sage:#6fae8c;       /* 2. 세이지 그린 - 추가/확인 등 긍정적 액션 */
    --cream:#f6f4ef;      /* 3. 웜 크림 - 배경/내부 박스 */
    --coral:#e0735c;      /* 4. 코랄 - 미팅 기준일/Weekly 날짜 등 "현재 시점" 강조 */
    --amber:#d9a44a;      /* 5. 앰버 - Monthly Mission 포인트 */
    --sky:#5f8fc4;         /* 보조: 오늘 날짜(캘린더) 전용 강조 */

    /* 파생 톤 (키컬러 기반 음영, 색상 추가 아님) */
    --ink-soft:#454858;
    --ink-faint:#9a9ba8;
    --sage-soft:#e3f0e8;
    --sage-deep:#4f8d6c;
    --coral-soft:#fbe6e1;
    --coral-deep:#c75a44;
    --amber-soft:#faeed7;
    --amber-deep:#b8842f;
    --sky-soft:#e2ecf6;
    --cream-deep:#ece9e1;
    --line:#e3e0d8;
    --text-dark:#2b2d3a;
    --text-mid:#8b8b93;
    --white:#ffffff;
    --danger:#d9745f;

    --radius-lg:22px;
    --radius-md:16px;
    --radius-sm:10px;
    --gap:18px;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Pretendard','Poppins','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--cream-deep);
    color:var(--text-dark);
    padding:0 16px 80px;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== Header ===== */
  header.top{
    background:var(--ink);
    color:var(--white);
    padding:20px 26px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    border-radius:var(--radius-lg);
    margin-top:16px;
  }
  header.top h1{
    margin:0;
    font-family:'Poppins','Pretendard',sans-serif;
    font-size:23px;
    font-weight:600;
    letter-spacing:0.2px;
  }
  .meeting-date-bar{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,0.07);
    padding:6px 8px;
    border-radius:999px;
  }
  .meeting-date-bar .label{
    font-size:12px;
    color:var(--ink-faint);
    font-weight:600;
    padding-left:8px;
  }
  .meeting-date-bar .date-display{
    font-size:14px;
    font-weight:700;
    color:#f4a896;
    min-width:108px;
    text-align:center;
    white-space:nowrap;
  }
  .meeting-date-bar button{
    background:transparent;
    border:none;
    color:#cfcfd6;
    width:28px;
    height:28px;
    font-size:13px;
    border-radius:999px;
    cursor:pointer;
    transition:.15s;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1;
  }
  .meeting-date-bar button:hover{
    background:var(--sage);
    color:var(--ink);
  }
  .meeting-date-bar button:disabled{
    opacity:.3;
    cursor:default;
  }
  .meeting-date-bar button:disabled:hover{
    background:transparent;
    color:#cfcfd6;
  }

  /* ===== Top section: Year notice + Calendar ===== */
  .top-section{
    display:grid;
    grid-template-columns: 1.6fr 1fr;
    gap:16px;
    margin-top:16px;
  }
  @media (max-width: 900px){
    .top-section{grid-template-columns: 1fr;}
  }

  .notice-board{
    background:var(--white);
    padding:26px 28px;
    border-radius:var(--radius-lg);
  }
  .notice-board .year-label{
    font-family:'Poppins','Pretendard',sans-serif;
    font-size:22px;
    font-weight:700;
    margin:0 0 18px 0;
    color:var(--ink);
  }
  .notice-line{
    display:flex;
    align-items:baseline;
    gap:10px;
    border-bottom:1.5px solid var(--line);
    padding:9px 2px;
  }
  .notice-line input{
    flex:1;
    border:none;
    background:transparent;
    font-size:15px;
    font-weight:600;
    font-family:inherit;
    color:var(--text-dark);
    padding:4px 2px;
  }
  .notice-line input::placeholder{
    color:#c2bfb5;
    font-weight:500;
  }
  .notice-line input:focus{outline:none;}
  .notice-line.empty input{font-weight:400;}
  .notice-add{
    margin-top:12px;
    background:none;
    border:1.5px dashed var(--line);
    color:var(--text-mid);
    padding:9px;
    width:100%;
    cursor:pointer;
    border-radius:var(--radius-sm);
    font-size:13px;
    font-weight:600;
    transition:.15s;
  }
  .notice-add:hover{border-color:var(--sage); color:var(--sage-deep); background:var(--sage-soft);}

  .calendar-panel{
    background:var(--ink);
    color:#f1f1f1;
    padding:26px 28px;
    display:flex;
    flex-direction:column;
    border-radius:var(--radius-lg);
  }
  .calendar-panel h2{
    margin:0 0 4px 0;
    font-family:'Poppins','Pretendard',sans-serif;
    font-size:18px;
    font-weight:600;
    text-align:center;
    color:#fff;
  }
  .calendar-panel .desc{
    text-align:center;
    font-size:12px;
    opacity:.55;
    margin-bottom:18px;
  }
  #cal-month-label{
    color:#fff;
    font-weight:600;
  }
  .cal-grid{
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap:4px;
    font-size:12px;
    margin-bottom:14px;
  }
  .cal-grid .dow{
    text-align:center;
    font-weight:600;
    padding:4px 0;
    opacity:.5;
    color:#fff;
  }
  .cal-day{
    background:var(--ink-soft);
    border-radius:8px;
    min-height:46px;
    padding:4px 5px;
    font-size:11px;
    position:relative;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:2px;
    color:#fff;
    overflow:visible;
    transition:.12s;
  }
  .cal-day:hover{background:#54576a;}
  .cal-day.empty{background:transparent; cursor:default;}
  .cal-day.empty:hover{background:transparent;}
  .cal-day.today{
    background:var(--sky);
    box-shadow:0 0 0 2px rgba(95,143,196,0.4);
  }
  .cal-day.today:hover{background:#4f7eb0;}
  .cal-day.today .num{color:#fff; opacity:1;}
  .cal-day .num{font-weight:600; opacity:.85;}
  .cal-day .tag{
    color:#fff;
    border-radius:6px;
    padding:1px 5px;
    font-size:9px;
    line-height:1.4;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    position:relative;
    z-index:1;
  }
  .cal-day .tag.range-start{border-radius:6px 0 0 6px; margin-right:-5px;}
  .cal-day .tag.range-end{border-radius:0 6px 6px 0; margin-left:-5px;}
  .cal-day .tag.range-mid{border-radius:0; margin-left:-5px; margin-right:-5px;}
  .cal-day .tag.range-single{border-radius:6px;}
  .cal-day .tag.vacation{background:var(--sky);}
  .cal-day .tag.issue{background:var(--coral);}
  .cal-day .tag.birthday{background:#c97fb0;}
  .cal-legend{
    display:flex;
    gap:14px;
    justify-content:center;
    font-size:12px;
    margin-top:auto;
    padding-top:10px;
    color:#cfcfd6;
  }
  .cal-legend span{display:flex; align-items:center; gap:5px;}
  .legend-dot{width:9px;height:9px;border-radius:3px;display:inline-block;}
  .legend-dot.vacation{background:var(--sky);}
  .legend-dot.issue{background:var(--coral);}
  .legend-dot.birthday{background:#c97fb0;}

  /* ===== Member board ===== */
  #member-list{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:16px;
    margin-top:16px;
  }
  @media (max-width: 900px){
    #member-list{grid-template-columns: 1fr;}
  }
  .member-card{
    background:var(--white);
    padding:34px 28px 26px;
    display:flex;
    flex-direction:column;
    gap:18px;
    border-radius:var(--radius-lg);
    position:relative;
  }
  .member-name-tab{
    position:absolute;
    top:-14px;
    left:24px;
    background:var(--ink);
    color:#fff;
    padding:6px 16px;
    border-radius:999px;
    box-shadow:0 3px 8px rgba(43,45,58,0.25);
    z-index:2;
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    white-space:nowrap;
    cursor:text;
  }
  .member-name-tab:focus{outline:none; box-shadow:0 0 0 2px var(--sage);}
  .member-card-body{
    display:flex;
    gap:24px;
    flex-wrap:wrap;
  }

  .member-side{
    width:200px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    gap:14px;
    position:relative;
  }
  .member-id-row{
    display:flex;
    align-items:flex-start;
    gap:10px;
  }
  .avatar{
    width:96px;
    height:96px;
    border-radius:var(--radius-md);
    background:var(--cream);
    border:1.5px solid var(--line);
    color:var(--text-mid);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:12px;
    font-weight:600;
    line-height:1.4;
    flex-shrink:0;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    padding:0;
    transition:.15s;
  }
  .avatar:hover{border-color:var(--sage); color:var(--sage-deep); background:var(--sage-soft);}
  .avatar img{
    width:100%;height:100%;object-fit:cover;
  }
  .avatar input[type=file]{display:none;}

  /* 사진 옆 작은 말풍선 (개인 메모) */
  .mini-bubble-wrap{
    flex:1;
    position:relative;
    min-width:0;
    align-self:stretch;
    display:flex;
  }
  .mini-bubble-wrap::before{
    content:"";
    position:absolute;
    left:-6px;
    top:20px;
    width:12px;
    height:12px;
    background:var(--cream);
    border-radius:3px;
    transform:rotate(45deg);
    z-index:0;
  }
  .mini-bubble{
    background:var(--cream);
    border-radius:var(--radius-sm);
    padding:8px 10px;
    position:relative;
    z-index:1;
    width:100%;
  }
  .mini-bubble textarea{
    border:none;
    background:transparent;
    width:100%;
    resize:none;
    font-family:inherit;
    font-size:11px;
    line-height:1.4;
    color:var(--text-dark);
    height:80px;
    padding:0;
  }
  .mini-bubble textarea::placeholder{color:#bdb9ae;}
  .mini-bubble textarea:focus{outline:none;}

  .mission-block{
    background:var(--amber-soft);
    border-radius:var(--radius-md);
    padding:14px 14px 12px;
    border:1px solid rgba(217,164,74,0.25);
  }
  .mission-block h4{
    margin:0 0 10px 0;
    font-size:14px;
    font-weight:700;
    color:var(--amber-deep);
  }
  .mission-month{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    font-size:12px;
    font-weight:700;
    margin-bottom:8px;
  }
  .mission-month .month-label-wrap{
    display:flex;
    align-items:center;
    gap:4px;
  }
  .mission-month .month-text{
    font-size:12px;
    font-weight:700;
    color:var(--amber-deep);
  }
  .mission-month .nav-btn{
    border:none;
    background:var(--white);
    width:20px;
    height:20px;
    border-radius:999px;
    cursor:pointer;
    font-size:10px;
    line-height:1;
    color:var(--text-mid);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.15s;
  }
  .mission-month .nav-btn:hover{background:var(--amber); color:#fff;}
  .mission-month .nav-btn:disabled{opacity:.3; cursor:default;}
  .mission-month .nav-btn:disabled:hover{background:var(--white); color:var(--text-mid);}
  .mission-item{
    border-bottom:1.5px solid var(--line);
    padding:6px 2px;
    margin-bottom:4px;
  }
  .mission-item input{
    border:none;
    background:transparent;
    width:100%;
    font-size:13px;
    font-family:inherit;
    color:var(--text-dark);
  }
  .mission-item input:focus{outline:none;}
  .small-add{
    background:none;
    border:1.5px dashed var(--line);
    color:var(--text-mid);
    width:100%;
    padding:6px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    border-radius:var(--radius-sm);
    margin-top:6px;
    transition:.15s;
  }
  .small-add:hover{border-color:var(--sage); color:var(--sage-deep); background:var(--sage-soft);}
  .block-save{
    margin-top:8px;
    background:var(--ink);
    border:none;
    color:#fff;
    width:100%;
    padding:8px;
    font-size:12px;
    cursor:pointer;
    border-radius:var(--radius-sm);
    font-weight:600;
    transition:.15s;
  }
  .block-save:hover{background:var(--sage-deep);}
  .block-save.mission{background:var(--amber-deep);}
  .block-save.mission:hover{background:var(--amber);}
  .block-save.weekly{background:var(--coral-deep);}
  .block-save.weekly:hover{background:var(--coral);}

  /* ===== Weekly share box ===== */
  .weekly-box{
    flex:1;
    min-width:240px;
    background:var(--coral-soft);
    border-radius:var(--radius-md);
    padding:20px 22px;
    position:relative;
  }
  /* speech-bubble pointer */
  .weekly-box::before{
    content:"";
    position:absolute;
    left:-9px;
    top:42px;
    width:18px;
    height:18px;
    background:var(--coral-soft);
    border-radius:4px;
    transform:rotate(45deg);
  }
  .weekly-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:16px;
    flex-wrap:wrap;
    gap:8px;
  }
  .weekly-header h3{
    margin:0;
    font-family:'Poppins','Pretendard',sans-serif;
    font-size:20px;
    font-weight:700;
    color:var(--ink);
  }
  .weekly-header .weekly-date{
    font-size:13px;
    font-weight:700;
    text-align:right;
    color:#fff;
    background:var(--coral);
    padding:6px 14px;
    border-radius:999px;
    white-space:nowrap;
    letter-spacing:0.2px;
    box-shadow:0 2px 6px rgba(224,115,92,0.35);
  }
  .weekly-line{
    display:flex;
    align-items:center;
    gap:6px;
    border-bottom:1.5px solid var(--line);
    padding:9px 2px;
    margin-bottom:2px;
  }
  .weekly-line input{
    border:none;
    background:transparent;
    flex:1;
    width:100%;
    font-size:14px;
    font-family:inherit;
    color:var(--text-dark);
    padding:2px;
  }
  .weekly-line input:focus{outline:none;}
  .weekly-line.bold input{font-weight:700;}
  .weekly-line .line-del{
    flex-shrink:0;
    border:none;
    background:transparent;
    color:var(--ink-faint);
    width:20px;
    height:20px;
    border-radius:999px;
    cursor:pointer;
    font-size:11px;
    line-height:1;
    transition:.15s;
  }
  .weekly-line .line-del:hover{background:var(--danger); color:#fff;}
  .weekly-add{
    margin-top:8px;
    background:none;
    border:1.5px dashed var(--line);
    color:var(--text-mid);
    padding:7px;
    width:100%;
    cursor:pointer;
    border-radius:var(--radius-sm);
    font-size:12px;
    font-weight:600;
    transition:.15s;
  }
  .weekly-add:hover{border-color:var(--sage); color:var(--sage-deep); background:var(--sage-soft);}

  /* ===== Member card controls (move/delete) ===== */
  .card-controls{
    display:flex;
    flex-direction:row;
    gap:6px;
    justify-content:flex-end;
  }
  .card-controls button{
    background:var(--cream);
    border:none;
    width:30px;
    height:30px;
    cursor:pointer;
    font-size:13px;
    border-radius:999px;
    line-height:1;
    color:var(--text-mid);
    transition:.15s;
  }
  .card-controls button:hover{
    background:var(--sage);
    color:#fff;
  }
  .card-controls button.danger:hover{
    background:var(--danger);
    color:#fff;
  }

  /* ===== Add member ===== */
  .add-member-bar{
    background:var(--white);
    text-align:center;
    padding:26px;
    cursor:pointer;
    border-radius:var(--radius-lg);
    margin-top:16px;
    transition:.15s;
  }
  .add-member-bar:hover{background:var(--sage-soft);}
  .add-member-bar span{
    font-size:16px;
    color:var(--text-mid);
    font-weight:600;
    letter-spacing:0.5px;
    transition:.15s;
  }
  .add-member-bar:hover span{color:var(--sage-deep);}

  /* ===== Save status ===== */
  .save-status{
    position:fixed;
    bottom:18px;
    right:18px;
    background:var(--ink);
    color:#fff;
    padding:10px 18px;
    border-radius:999px;
    font-size:13px;
    opacity:0;
    transition:opacity .3s;
    z-index:50;
  }
  .save-status.show{opacity:1;}

  /* ===== Day editor modal ===== */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(43,45,58,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:#fff;
    width:320px;
    padding:24px;
    border-radius:var(--radius-lg);
  }
  .modal-box h3{margin:0 0 14px 0; font-size:16px; font-weight:700; color:var(--ink);}
  .modal-row{margin-bottom:12px;}
  .modal-row label{font-size:12px; font-weight:600; color:var(--text-mid); display:block; margin-bottom:5px;}
  .modal-row input, .modal-row select{
    width:100%; padding:9px 10px; border:1.5px solid var(--line); border-radius:var(--radius-sm); font-family:inherit; font-size:13px; color:var(--text-dark);
  }
  .modal-row input:focus, .modal-row select:focus{outline:none; border-color:var(--sage);}
  .modal-row-pair{
    display:flex; gap:10px; margin-bottom:12px;
  }
  .modal-row-pair .modal-row{
    flex:1; margin-bottom:0;
  }
  .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:16px;}
  .modal-actions button{
    padding:9px 16px; border-radius:999px; border:1.5px solid var(--line); background:#fff; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-mid); transition:.15s;
  }
  .modal-actions button:hover{border-color:var(--text-mid);}
  .modal-actions button.primary{background:var(--ink); color:#fff; border-color:var(--ink);}
  .modal-actions button.primary:hover{background:var(--sage-deep); border-color:var(--sage-deep);}
  .modal-tag-list{display:flex; flex-direction:column; gap:6px; margin-bottom:10px;}
  .modal-tag-list .existing-tag{
    display:flex; align-items:center; gap:6px; font-size:12px; background:var(--cream); padding:7px 10px; border-radius:var(--radius-sm); color:var(--text-dark);
  }
  .modal-tag-list .existing-tag .x{cursor:pointer; color:var(--danger); font-weight:700;}
  .modal-tag-list .existing-tag .edit{cursor:pointer; color:var(--amber-deep); font-weight:700;}
</style>
</head>
<body>

<header class="top">
  <h1>MD Team Meeting</h1>
  <div class="meeting-date-bar">
    <span class="label">미팅 기준일</span>
    <button id="meet-prev" class="nav-date" title="이전 주차">◀</button>
    <span class="date-display" id="meet-date-display">-</span>
    <button id="meet-next" class="nav-date" title="다음 주차">▶</button>
  </div>
</header>

<section class="top-section">
  <div class="notice-board">
    <p class="year-label" id="year-label" contenteditable="true">&lt; 2026Y &gt;</p>
    <div id="notice-lines"></div>
    <button class="notice-add" id="add-notice">+ 항목 추가</button>
  </div>

  <div class="calendar-panel">
    <h2>캘린더</h2>
    <p class="desc">휴가·이슈·생일 체크 가능한 캘린더 기능</p>

<script>
/* =========================================================
   MD Team Meeting - Frontend logic
   -----------------------------------------------------
   데이터 저장 구조 (DATA 객체)를 JSON으로 직렬화하여
   Google Apps Script Web App(GAS)에 전송/조회합니다.

   ===== 연동 방법 (Google Apps Script) =====
   1) Google Sheets 새 시트 생성 (예: "MD_Meeting_DB")
   2) 확장프로그램 > Apps Script 에서 아래와 같은 doGet/doPost 함수를 작성
      - doGet(): 시트의 JSON 데이터를 반환
      - doPost(e): e.postData.contents (JSON 문자열)을 시트에 저장
   3) 배포 > 새 배포 > 웹앱으로 배포 (액세스 권한: 모든 사용자)
   4) 발급된 웹앱 URL을 아래 SCRIPT_URL 에 붙여넣기
   5) 이미지 업로드는 Drive API(또는 GAS의 DriveApp)를 통해
      base64로 전송 -> Drive에 저장 -> 공개 URL 반환하는 방식으로 확장 가능
   ========================================================= */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTtJMe_Mqn1FV5NhKxndZn_SRAEmFwVK9lLkwXDildAYrcHC9gN_N9CB0OFdLideMHfg/exec";

// ---------- 기본 데이터 구조 ----------
let DATA = {
  year: "< 2026Y >",
  notices: [
    {text:""},
    {text:""}
  ],
  calendar: {
    monthLabel: "2026.06",
    events: []
    // {id, type:"vacation"|"issue"|"birthday", text:"홍길동 휴가", start:"2026-06-15", end:"2026-06-19"}
  },
  // ===== 전역 미팅 기준일 (주차의 월요일, ISO 형식 YYYY-MM-DD) =====
  currentMeetingWeek: "2026-06-15",
  members: [
    {
      id: "m1",
      name: "홍길동",
      avatar: "",
      memo: "",
      // Monthly Mission: 월별 아카이브
      missionCurrentMonth: "2026.06",
      missionArchive: {
        "2026.05": ["", ""],
        "2026.06": ["", ""]
      },
      // Weekly Share: 주차(월요일 ISO)별 아카이브
      weeklyArchive: {
        "2026-06-15": ["", "", "", "", ""]
      }
    },
    {
      id: "m2",
      name: "홍길동",
      avatar: "",
      memo: "",
      missionCurrentMonth: "2026.06",
      missionArchive: {
        "2026.05": ["", ""],
        "2026.06": ["", ""]
      },
      weeklyArchive: {
        "2026-06-15": ["", "", "", "", ""]
      }
    }
  ]
};

const MEETING_WEEK_START = "2026-06-15"; // 운영 시작 주차 (월요일)
const MEETING_WEEK_MAX_FUTURE = 3;        // 오늘 기준 향후 이동 가능한 최대 주차 수
const WEEKLY_FIXED_LINES = 5;             // Weekly Share 기본 고정 줄 수 (이 이후 줄만 삭제 가능)

// ---------- 유틸: 주차(월요일) 관련 ----------
function parseISODate(str){
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y, m-1, d);
}
function formatISODate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// 주어진 날짜가 속한 주의 월요일(ISO) 반환
function getMondayOf(d){
  const day = d.getDay(); // 0=일 ... 6=토
  const diff = day === 0 ? -6 : 1 - day; // 월요일까지의 offset
  const monday = new Date(d);
  monday.setDate(d.getDate() + diff);
  return formatISODate(monday);
}
// 월요일(ISO) 기준 n주 이동
function shiftWeek(mondayISO, delta){
  const d = parseISODate(mondayISO);
  d.setDate(d.getDate() + delta*7);
  return formatISODate(d);
}
// "6월 15일 주차" 형태 라벨 생성
function weekLabel(mondayISO){
  const d = parseISODate(mondayISO);
  return `${d.getMonth()+1}월 ${d.getDate()}일 주차`;
}
// 오늘 기준 이동 가능한 가장 미래 주차(월요일 ISO)
function getMaxFutureWeek(){
  const thisMonday = getMondayOf(new Date());
  return shiftWeek(thisMonday, MEETING_WEEK_MAX_FUTURE);
}

// ---------- 유틸: YYYY.MM 월 이동 ----------
function shiftMonth(yyyymm, delta){
  const [y, m] = yyyymm.split(".").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ---------- 유틸: YYYY.MM.DD 옛 형식 -> ISO 변환 (마이그레이션용) ----------
function dotDateToISO(str){
  // "2026.06.16" -> "2026-06-16"
  const parts = str.split(".");
  if(parts.length !== 3) return null;
  const [y,m,d] = parts.map(Number);
  if(!y || !m || !d) return null;
  return formatISODate(new Date(y, m-1, d));
}

// ---------- 마이그레이션: 옛 구조 -> 새 구조 ----------
function migrateData(json){
  if(!json || !json.members) return json;

  const allWeekKeys = new Set();

  json.members.forEach(member=>{
    // 옛 Monthly Mission 구조 (missionMonth / missions) -> missionArchive
    if(member.missionArchive === undefined){
      const month = member.missionMonth || "2026.06";
      member.missionCurrentMonth = month;
      member.missionArchive = {
        [month]: member.missions || ["", ""]
      };
      delete member.missionMonth;
      delete member.missions;
    }
    if(member.missionCurrentMonth === undefined){
      member.missionCurrentMonth = Object.keys(member.missionArchive)[0] || "2026.06";
    }

    // 옛 Weekly Share 구조 (weeklyDate / weeklyItems) -> weeklyArchive
    if(member.weeklyArchive === undefined){
      const date = member.weeklyDate || member.weeklyCurrentDate || "2026.06.16";
      member.weeklyArchive = {
        [date]: member.weeklyItems || ["", "", "", "", ""]
      };
      delete member.weeklyDate;
      delete member.weeklyItems;
    }
    delete member.weeklyCurrentDate;

    if(member.memo === undefined) member.memo = "";

    // weeklyArchive의 키가 "YYYY.MM.DD" 형식(옛 날짜)이면 그 주의 월요일(ISO) 키로 변환
    const newArchive = {};
    Object.keys(member.weeklyArchive).forEach(key=>{
      let weekKey = key;
      if(/^\d{4}\.\d{2}\.\d{2}$/.test(key)){
        const iso = dotDateToISO(key);
        const d = parseISODate(iso);
        weekKey = getMondayOf(d);
      }
      // 이미 같은 주차 키가 있으면 합치지 않고 최신 것 유지 (단순화)
      if(!newArchive[weekKey]){
        newArchive[weekKey] = member.weeklyArchive[key];
      }
    });
    member.weeklyArchive = newArchive;

    Object.keys(member.weeklyArchive).forEach(d=>allWeekKeys.add(d));
  });

  // 옛 전역 구조(meetingDates/currentMeetingDate) 제거, currentMeetingWeek로 통합
  if(json.currentMeetingWeek === undefined){
    if(typeof json.currentMeetingDate === "string"){
      let key = json.currentMeetingDate;
      if(/^\d{4}\.\d{2}\.\d{2}$/.test(key)){
        const iso = dotDateToISO(key);
        key = getMondayOf(parseISODate(iso));
      }
      json.currentMeetingWeek = key;
    }
  }
  delete json.meetingDates;
  delete json.currentMeetingDate;

  if(!json.currentMeetingWeek){
    // 가장 최근(가장 큰) 주차 키를 사용, 없으면 시작 주차
    const sorted = [...allWeekKeys].sort();
    json.currentMeetingWeek = sorted.length ? sorted[sorted.length-1] : MEETING_WEEK_START;
  }

  // 모든 멤버에게 현재 주차 키가 없으면 빈 항목 생성
  json.members.forEach(member=>{
    if(!member.weeklyArchive[json.currentMeetingWeek]){
      member.weeklyArchive[json.currentMeetingWeek] = ["", "", "", "", ""];
    }
  });

  // 옛 캘린더 이벤트 구조 (날짜키 객체) -> 범위 이벤트 배열
  if(json.calendar && json.calendar.events && !Array.isArray(json.calendar.events)){
    const oldEvents = json.calendar.events;
    const newEvents = [];
    Object.keys(oldEvents).forEach(dateKey=>{
      (oldEvents[dateKey] || []).forEach(ev=>{
        newEvents.push({
          id: "ev" + Date.now() + Math.random().toString(16).slice(2),
          type: ev.type,
          text: ev.text,
          start: dateKey,
          end: dateKey
        });
      });
    });
    json.calendar.events = newEvents;
  }
  if(!json.calendar) json.calendar = { monthLabel:"2026.06", events: [] };
  if(!json.calendar.events) json.calendar.events = [];

  // 옛 이벤트 종류 'meeting' -> 'issue'로 통합 (휴가/이슈/생일 3종 체계)
  json.calendar.events.forEach(ev=>{
    if(ev.type === "meeting") ev.type = "issue";
    if(!ev.id) ev.id = "ev" + Date.now() + Math.random().toString(16).slice(2);
  });

  return json;
}
async function loadData(){
  // GAS 연동 전: 로컬 메모리의 기본값 사용
  if(SCRIPT_URL.startsWith("YOUR_")){
    render();
    return;
  }
  try{
    const res = await fetch(SCRIPT_URL);
    const json = await res.json();
    if(json && json.members){
      DATA = migrateData(json);
      // 마이그레이션된 구조를 다시 저장해 다음부터는 변환 불필요
      saveData();
    }
  }catch(err){
    console.error("불러오기 실패:", err);
  }
  render();
}

// ---------- 저장 ----------
async function saveData(){
  showSaveStatus("저장 중...");
  if(SCRIPT_URL.startsWith("YOUR_")){
    // GAS 미연동 상태 - 콘솔에만 출력 (실제 운영시 위 SCRIPT_URL 설정 필요)
    console.log("SAVE (local only):", DATA);
    setTimeout(()=>showSaveStatus("저장됨 (로컬, GAS 미연동)"), 300);
    return;
  }
  try{
    await fetch(SCRIPT_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(DATA)
    });
    showSaveStatus("저장됨");
  }catch(err){
    console.error("저장 실패:", err);
    showSaveStatus("저장 실패");
  }
}

function showSaveStatus(msg){
  const el = document.getElementById("save-status");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 1800);
}

// 자동 저장 (입력 후 일정 시간 뒤)
let saveTimer = null;
function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 800);
}

// ---------- 렌더링 ----------
function render(){
  renderMeetingDateBar();
  renderNotices();
  renderCalendar();
  renderMembers();
}

// --- Notice board ---
function renderNotices(){
  document.getElementById("year-label").textContent = DATA.year;
  const wrap = document.getElementById("notice-lines");
  wrap.innerHTML = "";
  DATA.notices.forEach((item, idx)=>{
    const row = document.createElement("div");
    row.className = "notice-line" + (item.text ? "" : " empty");
    const input = document.createElement("input");
    input.type="text";
    input.placeholder="";
    input.value = item.text;
    input.addEventListener("input", ()=>{
      DATA.notices[idx].text = input.value;
      row.className = "notice-line" + (input.value ? "" : " empty");
      scheduleSave();
    });
    row.appendChild(input);
    wrap.appendChild(row);
  });
}
document.getElementById("add-notice").addEventListener("click", ()=>{
  DATA.notices.push({text:""});
  renderNotices();
  scheduleSave();
});
document.getElementById("year-label").addEventListener("input", (e)=>{
  DATA.year = e.target.textContent;
  scheduleSave();
});

// --- Calendar ---
let calCurrentDate = new Date(2026, 5, 1); // 2026-06

function renderCalendar(){
  const label = document.getElementById("cal-month-label");
  const y = calCurrentDate.getFullYear();
  const m = calCurrentDate.getMonth(); // 0-based
  label.textContent = `${y}.${String(m+1).padStart(2,'0')}`;

  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";

  const dows = ["일","월","화","수","목","금","토"];
  dows.forEach(d=>{
    const el = document.createElement("div");
    el.className = "dow";
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m+1, 0).getDate();
  const todayObj = new Date();
  const todayKey = `${todayObj.getFullYear()}-${String(todayObj.getMonth()+1).padStart(2,'0')}-${String(todayObj.getDate()).padStart(2,'0')}`;

  for(let i=0;i<firstDay;i++){
    const el = document.createElement("div");
    el.className = "cal-day empty";
    grid.appendChild(el);
  }

  for(let d=1; d<=lastDate; d++){
    const dateKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = (firstDay + (d-1)) % 7; // 0=일 ... 6=토, 이 셀의 요일 위치
    const cell = document.createElement("div");
    cell.className = "cal-day" + (dateKey === todayKey ? " today" : "");
    cell.dataset.date = dateKey;

    const num = document.createElement("div");
    num.className = "num";
    num.textContent = d;
    cell.appendChild(num);

    const events = getEventsForDate(dateKey);
    events.forEach(ev=>{
      const tag = document.createElement("div");
      const isStartOfRange = ev.start === dateKey;
      const isEndOfRange = ev.end === dateKey;
      // 주(week)가 바뀌면 이어붙이지 않고 그 줄의 시작/끝으로 처리
      const isRowStart = isStartOfRange || dow === 0;
      const isRowEnd = isEndOfRange || dow === 6;

      let posClass;
      if(isRowStart && isRowEnd) posClass = "range-single";
      else if(isRowStart) posClass = "range-start";
      else if(isRowEnd) posClass = "range-end";
      else posClass = "range-mid";

      tag.className = "tag " + eventTypeClass(ev.type) + " " + posClass;
      // 텍스트는 범위 시작일(또는 그 줄의 첫 칸)에만 표시
      tag.textContent = (isStartOfRange || dow === 0) ? ev.text : "\u00A0";
      cell.appendChild(tag);
    });

    cell.addEventListener("click", ()=>openDayModal(dateKey));
    grid.appendChild(cell);
  }
}

// 특정 날짜(YYYY-MM-DD)가 포함된 이벤트 목록 반환 (시작일 기준 정렬)
function getEventsForDate(dateKey){
  return DATA.calendar.events
    .filter(ev => ev.start <= dateKey && dateKey <= ev.end)
    .sort((a,b)=> a.start.localeCompare(b.start));
}

// 이벤트 종류 -> CSS 클래스 / 아이콘+라벨
function eventTypeClass(type){
  if(type === "issue") return "issue";
  if(type === "birthday") return "birthday";
  return "vacation";
}
function eventTypeIconLabel(type){
  if(type === "issue") return "🟧 이슈";
  if(type === "birthday") return "🟣 생일";
  return "🟦 휴가";
}

// --- Day modal ---
let modalDateKey = null;
let editingEventId = null; // null이면 추가 모드, 값이 있으면 해당 이벤트 수정 모드

function resetModalForm(dateKey){
  editingEventId = null;
  document.getElementById("modal-input-text").value = "";
  document.getElementById("modal-input-type").value = "vacation";
  document.getElementById("modal-input-start").value = dateKey;
  document.getElementById("modal-input-end").value = dateKey;
  document.getElementById("modal-add").textContent = "추가";
  document.getElementById("modal-cancel-edit").style.display = "none";
}

function openDayModal(dateKey){
  modalDateKey = dateKey;
  document.getElementById("modal-date-title").textContent = dateKey + " 일정";
  resetModalForm(dateKey);
  renderModalExisting(dateKey);
  document.getElementById("modal-overlay").classList.add("show");
}

function renderModalExisting(dateKey){
  const existingWrap = document.getElementById("modal-existing");
  existingWrap.innerHTML = "";
  const events = getEventsForDate(dateKey);

  if(events.length === 0){
    const empty = document.createElement("div");
    empty.style.fontSize = "12px";
    empty.style.color = "#999";
    empty.textContent = "등록된 일정이 없습니다.";
    existingWrap.appendChild(empty);
  }

  events.forEach((ev)=>{
    const row = document.createElement("div");
    row.className = "existing-tag";
    const rangeLabel = ev.start === ev.end ? ev.start : `${ev.start} ~ ${ev.end}`;

    const label = document.createElement("span");
    label.style.flex = "1";
    label.textContent = `${eventTypeIconLabel(ev.type)} - ${ev.text} (${rangeLabel})`;
    row.appendChild(label);

    const editBtn = document.createElement("span");
    editBtn.className = "edit";
    editBtn.textContent = "✎";
    editBtn.title = "수정";
    editBtn.addEventListener("click", ()=>{
      editingEventId = ev.id;
      document.getElementById("modal-input-text").value = ev.text;
      document.getElementById("modal-input-type").value = ev.type;
      document.getElementById("modal-input-start").value = ev.start;
      document.getElementById("modal-input-end").value = ev.end;
      document.getElementById("modal-add").textContent = "수정 완료";
      document.getElementById("modal-cancel-edit").style.display = "";
    });
    row.appendChild(editBtn);

    const x = document.createElement("span");
    x.className = "x";
    x.textContent = "✕";
    x.addEventListener("click", ()=>{
      const realIdx = DATA.calendar.events.findIndex(e=>e.id === ev.id);
      if(realIdx > -1) DATA.calendar.events.splice(realIdx,1);
      if(editingEventId === ev.id) resetModalForm(dateKey);
      renderModalExisting(dateKey);
      renderCalendar();
      scheduleSave();
    });
    row.appendChild(x);
    existingWrap.appendChild(row);
  });
}

document.getElementById("modal-close").addEventListener("click", ()=>{
  document.getElementById("modal-overlay").classList.remove("show");
});

document.getElementById("modal-cancel-edit").addEventListener("click", ()=>{
  resetModalForm(modalDateKey);
});

document.getElementById("modal-add").addEventListener("click", ()=>{
  const text = document.getElementById("modal-input-text").value.trim();
  const type = document.getElementById("modal-input-type").value;
  let start = document.getElementById("modal-input-start").value;
  let end = document.getElementById("modal-input-end").value;
  if(!text) return;
  if(!start) start = modalDateKey;
  if(!end) end = start;
  if(end < start){ [start, end] = [end, start]; } // 역순 입력 시 자동 보정

  if(editingEventId){
    // 수정 모드: 기존 이벤트 갱신
    const ev = DATA.calendar.events.find(e=>e.id === editingEventId);
    if(ev){
      ev.type = type;
      ev.text = text;
      ev.start = start;
      ev.end = end;
    }
  }else{
    // 추가 모드: 새 이벤트 생성
    DATA.calendar.events.push({
      id: "ev" + Date.now(),
      type,
      text,
      start,
      end
    });
  }

  resetModalForm(modalDateKey);
  renderModalExisting(modalDateKey);
  renderCalendar();
  scheduleSave();
});

// --- Members ---
function renderMembers(){
  const list = document.getElementById("member-list");
  list.innerHTML = "";

  DATA.members.forEach((member, idx)=>{
    const card = document.createElement("div");
    card.className = "member-card";

    // ===== 이름 탭 (카드 좌측 상단에 튀어나오는 형태) =====
    const nameTab = document.createElement("div");
    nameTab.className = "member-name-tab";
    nameTab.contentEditable = "true";
    nameTab.textContent = member.name;
    nameTab.addEventListener("input", ()=>{
      member.name = nameTab.textContent;
      scheduleSave();
    });
    card.appendChild(nameTab);

    const body = document.createElement("div");
    body.className = "member-card-body";

    // ===== Left side =====
    const side = document.createElement("div");
    side.className = "member-side";

    const idRow = document.createElement("div");
    idRow.className = "member-id-row";

    // avatar
    const avatarLabel = document.createElement("label");
    avatarLabel.className = "avatar";
    if(member.avatar){
      avatarLabel.innerHTML = `<img src="${member.avatar}" alt="사진">`;
    }else{
      avatarLabel.innerHTML = `<span>사진</span>`;
    }
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        member.avatar = ev.target.result; // base64 (운영시 Drive 업로드 후 URL 교체 권장)
        avatarLabel.innerHTML = `<img src="${member.avatar}" alt="사진">`;
        avatarLabel.appendChild(fileInput);
        scheduleSave();
      };
      reader.readAsDataURL(file);
    });
    avatarLabel.appendChild(fileInput);
    idRow.appendChild(avatarLabel);

    // mini speech bubble (개인 메모, 사진과 Weekly Share 사이)
    const bubbleWrap = document.createElement("div");
    bubbleWrap.className = "mini-bubble-wrap";
    const bubble = document.createElement("div");
    bubble.className = "mini-bubble";
    const memoInput = document.createElement("textarea");
    memoInput.placeholder = "한마디";
    memoInput.value = member.memo || "";
    memoInput.addEventListener("input", ()=>{
      member.memo = memoInput.value;
      scheduleSave();
    });
    bubble.appendChild(memoInput);
    bubbleWrap.appendChild(bubble);
    idRow.appendChild(bubbleWrap);

    side.appendChild(idRow);

    // mission block
    const missionBlock = document.createElement("div");
    missionBlock.className = "mission-block";
    const missionTitle = document.createElement("h4");
    missionTitle.textContent = "Monthly Mission";
    missionBlock.appendChild(missionTitle);

    // 현재 월에 아카이브가 없으면 생성
    if(!member.missionArchive[member.missionCurrentMonth]){
      member.missionArchive[member.missionCurrentMonth] = ["", ""];
    }
    const currentMissions = member.missionArchive[member.missionCurrentMonth];

    const monthRow = document.createElement("div");
    monthRow.className = "mission-month";

    const labelWrap = document.createElement("div");
    labelWrap.className = "month-label-wrap";

    const prevBtn = document.createElement("button");
    prevBtn.className = "nav-btn";
    prevBtn.textContent = "◀";
    prevBtn.title = "전월";
    prevBtn.addEventListener("click", ()=>{
      member.missionCurrentMonth = shiftMonth(member.missionCurrentMonth, -1);
      renderMembers();
    });
    labelWrap.appendChild(prevBtn);

    const monthText = document.createElement("span");
    monthText.className = "month-text";
    monthText.textContent = `< ${member.missionCurrentMonth} >`;
    labelWrap.appendChild(monthText);

    const nextBtn = document.createElement("button");
    nextBtn.className = "nav-btn";
    nextBtn.textContent = "▶";
    nextBtn.title = "익월";
    nextBtn.addEventListener("click", ()=>{
      member.missionCurrentMonth = shiftMonth(member.missionCurrentMonth, 1);
      renderMembers();
    });
    labelWrap.appendChild(nextBtn);

    monthRow.appendChild(labelWrap);
    missionBlock.appendChild(monthRow);

    currentMissions.forEach((m, mIdx)=>{
      const item = document.createElement("div");
      item.className = "mission-item";
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "";
      input.value = m;
      input.addEventListener("input", ()=>{
        currentMissions[mIdx] = input.value;
      });
      item.appendChild(input);
      missionBlock.appendChild(item);
    });
    const missionAdd = document.createElement("button");
    missionAdd.className = "small-add";
    missionAdd.textContent = "+ 미션 추가";
    missionAdd.addEventListener("click", ()=>{
      currentMissions.push("");
      renderMembers();
    });
    missionBlock.appendChild(missionAdd);

    const missionSave = document.createElement("button");
    missionSave.className = "block-save mission";
    missionSave.textContent = "내용 저장";
    missionSave.addEventListener("click", ()=>{
      saveData();
    });
    missionBlock.appendChild(missionSave);

    side.appendChild(missionBlock);
    body.appendChild(side);

    // ===== Weekly box =====
    const weekly = document.createElement("div");
    weekly.className = "weekly-box";

    const header = document.createElement("div");
    header.className = "weekly-header";
    const h3 = document.createElement("h3");
    h3.textContent = "Weekly Share";
    header.appendChild(h3);

    // 현재 미팅 주차에 아카이브가 없으면 생성
    if(!member.weeklyArchive[DATA.currentMeetingWeek]){
      member.weeklyArchive[DATA.currentMeetingWeek] = ["", "", "", "", ""];
    }
    const currentWeeklyItems = member.weeklyArchive[DATA.currentMeetingWeek];

    const dateLabel = document.createElement("span");
    dateLabel.className = "weekly-date";
    dateLabel.textContent = weekLabel(DATA.currentMeetingWeek);
    header.appendChild(dateLabel);

    weekly.appendChild(header);

    currentWeeklyItems.forEach((w, wIdx)=>{
      const line = document.createElement("div");
      line.className = "weekly-line" + (wIdx === 0 ? " bold" : "");
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "";
      input.value = w;
      input.addEventListener("input", ()=>{
        currentWeeklyItems[wIdx] = input.value;
      });
      line.appendChild(input);

      // 기본 고정 줄(WEEKLY_FIXED_LINES개) 이후, 직접 추가한 줄만 삭제 가능
      if(wIdx >= WEEKLY_FIXED_LINES){
        const delBtn = document.createElement("button");
        delBtn.className = "line-del";
        delBtn.textContent = "✕";
        delBtn.title = "이 줄 삭제";
        delBtn.addEventListener("click", ()=>{
          currentWeeklyItems.splice(wIdx, 1);
          renderMembers();
          scheduleSave();
        });
        line.appendChild(delBtn);
      }

      weekly.appendChild(line);
    });
    const weeklyAdd = document.createElement("button");
    weeklyAdd.className = "weekly-add";
    weeklyAdd.textContent = "+ 줄 추가";
    weeklyAdd.addEventListener("click", ()=>{
      currentWeeklyItems.push("");
      renderMembers();
    });
    weekly.appendChild(weeklyAdd);

    const weeklySave = document.createElement("button");
    weeklySave.className = "block-save weekly";
    weeklySave.textContent = "내용 저장";
    weeklySave.addEventListener("click", ()=>{
      saveData();
    });
    weekly.appendChild(weeklySave);

    body.appendChild(weekly);
    card.appendChild(body);

    // ===== Controls (move up/down, delete) =====
    const controls = document.createElement("div");
    controls.className = "card-controls";

    const upBtn = document.createElement("button");
    upBtn.textContent = "▲";
    upBtn.title = "위로 이동";
    upBtn.disabled = idx === 0;
    upBtn.addEventListener("click", ()=>{
      if(idx === 0) return;
      [DATA.members[idx-1], DATA.members[idx]] = [DATA.members[idx], DATA.members[idx-1]];
      renderMembers();
      scheduleSave();
    });
    controls.appendChild(upBtn);

    const downBtn = document.createElement("button");
    downBtn.textContent = "▼";
    downBtn.title = "아래로 이동";
    downBtn.disabled = idx === DATA.members.length-1;
    downBtn.addEventListener("click", ()=>{
      if(idx === DATA.members.length-1) return;
      [DATA.members[idx+1], DATA.members[idx]] = [DATA.members[idx], DATA.members[idx+1]];
      renderMembers();
      scheduleSave();
    });
    controls.appendChild(downBtn);

    const delBtn = document.createElement("button");
    delBtn.textContent = "✕";
    delBtn.title = "삭제";
    delBtn.className = "danger";
    delBtn.addEventListener("click", ()=>{
      if(!confirm(`${member.name} 카드를 삭제할까요?`)) return;
      DATA.members.splice(idx,1);
      renderMembers();
      scheduleSave();
    });
    controls.appendChild(delBtn);

    card.appendChild(controls);

    list.appendChild(card);
  });
}

// --- Add member ---
document.getElementById("add-member").addEventListener("click", ()=>{
  const newId = "m" + (Date.now());
  const now = new Date();
  const curMonth = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}`;

  DATA.members.push({
    id: newId,
    name: "이름 입력",
    avatar: "",
    memo: "",
    missionCurrentMonth: curMonth,
    missionArchive: { [curMonth]: ["", ""] },
    weeklyArchive: { [DATA.currentMeetingWeek]: ["", "", "", "", ""] }
  });
  renderMembers();
  scheduleSave();
});

// --- 미팅 기준일(주차) 컨트롤 ---
function renderMeetingDateBar(){
  const display = document.getElementById("meet-date-display");
  const prevBtn = document.getElementById("meet-prev");
  const nextBtn = document.getElementById("meet-next");

  display.textContent = weekLabel(DATA.currentMeetingWeek);

  // 과거는 운영 시작 주차까지, 미래는 오늘 기준 +3주까지만 이동 가능
  const maxFuture = getMaxFutureWeek();
  prevBtn.disabled = DATA.currentMeetingWeek <= MEETING_WEEK_START;
  nextBtn.disabled = DATA.currentMeetingWeek >= maxFuture;
}

document.getElementById("meet-prev").addEventListener("click", ()=>{
  if(DATA.currentMeetingWeek <= MEETING_WEEK_START) return;
  DATA.currentMeetingWeek = shiftWeek(DATA.currentMeetingWeek, -1);
  // 각 멤버에 해당 주차 아카이브가 없으면 생성
  DATA.members.forEach(member=>{
    if(!member.weeklyArchive[DATA.currentMeetingWeek]){
      member.weeklyArchive[DATA.currentMeetingWeek] = ["", "", "", "", ""];
    }
  });
  render();
  scheduleSave();
});

document.getElementById("meet-next").addEventListener("click", ()=>{
  const maxFuture = getMaxFutureWeek();
  if(DATA.currentMeetingWeek >= maxFuture) return;
  DATA.currentMeetingWeek = shiftWeek(DATA.currentMeetingWeek, 1);
  DATA.members.forEach(member=>{
    if(!member.weeklyArchive[DATA.currentMeetingWeek]){
      member.weeklyArchive[DATA.currentMeetingWeek] = ["", "", "", "", ""];
    }
  });
  render();
  scheduleSave();
});

// --- Init ---
loadData();
</script>
