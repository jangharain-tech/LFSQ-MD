<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LFSQ MD팀 AI 업무 효율화</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* 기존 스타일 유지 */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', sans-serif; background: #f5f6fa; color: #1a1a2e; font-size: 13px; }
#auth-shield { position: fixed; inset: 0; z-index: 10000; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#auth-shield.hidden { display: none; }
.login-card { text-align: center; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 350px; }
.google-login-btn { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
.top-bar { background: #fff; border-bottom: 1px solid #ebebf0; padding: 0 20px; height: 66px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
.top-left { display: flex; align-items: center; gap: 12px; }
.top-mascot { height: 50px; width: 50px; object-fit: cover; border-radius: 50%; cursor: pointer; border: 1px solid #eee; background: #eee; }
.top-title { font-size: 16px; font-weight: 700; color: #111; }
.top-right { display: flex; align-items: center; gap: 12px; }
.presence-list { display: flex; align-items: center; margin-right: 10px; }
.presence-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; margin-left: -10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.btn-admin { background: #ff4d4f; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; display: none; }
.btn-primary { background: #2a2a2a; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
.editor-only { display: none; }
body.can-edit .editor-only { display: inline-block; }
.sheet-wrap { padding: 20px; overflow-x: auto; }
table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 1400px; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,.06); }
thead th { background: #2a2a2a; color: #fff; padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; }
tbody td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: top; border-right: 1px solid #f3f3f3; }

/* 행 드래그 상태 스타일 */
body.can-edit tbody tr { cursor: grab; }
body.can-edit tbody tr:active { cursor: grabbing; }
tr.dragging { opacity: 0.5; background: #e8f0fe; }
tr.over { border-top: 2px solid #3b7dd8; }

tr.status-done { background: #f9f9f9; opacity: 0.7; color: #aaa; }
.tf-group { display: flex; flex-direction: column; gap: 4px; }
.tf-btn { width: 85px; height: 26px; border: 1.5px solid #e8e8f0; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 700; color: #ccc; background: #fff; display: flex; align-items: center; justify-content: center; }
.tf-btn.tf-active { background: #2a2a2a; color: #fff; border-color: #2a2a2a; }
.tf-btn.team-active { background: #3b7dd8; color: #fff; border-color: #3b7dd8; }
.req-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.req-cb { width: 16px; height: 16px; border: 2px solid #c8cce0; border-radius: 4px; cursor: pointer; flex-shrink: 0; }
.req-cb.checked { background: #2a2a2a; border-color: #2a2a2a; position: relative; }
.req-cb.checked::after { content: '✓'; color: #fff; font-size: 10px; position: absolute; left: 2px; top: -1px; }
.req-text.done { text-decoration: line-through; color: #bbb; }
.persp-toggle { cursor: pointer; font-weight: 700; color: #2a2a2a; font-size: 13px; display: inline-block; padding: 4px 8px; border-radius: 4px; }
.pipe-group { display: flex; flex-wrap: wrap; gap: 5px; }
.pipe-item { padding: 4px 10px; border-radius: 20px; border: 1.5px solid #e8e8f0; font-size: 11px; color: #ccc; font-weight: 700; }
.pipe-item.active { background: #2a2a2a; color: #fff; border-color: #2a2a2a; }
#admin-modal { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; }
.modal-content { background: #fff; width: 450px; border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
#sync-indicator { position: fixed; bottom: 20px; right: 20px; background: #fff; padding: 6px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 11px; display: none; z-index: 100; }
</style>
</head>
<body>

<div id="auth-shield">
  <div class="login-card">
    <h2>MD팀 업무 효율화</h2>
    <p style="color:#888; font-size:13px; margin-top:5px">로그인이 필요합니다.</p>
    <button class="google-login-btn" onclick="signIn()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18"> Google 계정 로그인
    </button>
    <div id="denied-msg" style="color:red; margin-top:15px; display:none; font-size:12px">권한이 없습니다. 관리자에게 문의하세요.</div>
  </div>
</div>

<div class="top-bar">
  <div class="top-left">
    <img id="display-mascot" src="" class="top-mascot" onclick="if(userRole==='admin') document.getElementById('mascot-input').click()">
    <input type="file" id="mascot-input" style="display:none" accept="image/*" onchange="uploadMascot(this.files[0])">
    <div class="top-title">MD팀 AI 업무 효율화</div>
  </div>
  <div class="top-right">
    <div id="presence-list" class="presence-list"></div>
    <button id="admin-btn" class="btn-admin" onclick="openAdmin()">⚙️ 관리자 설정</button>
    <button class="editor-only btn-primary" onclick="addNewTask()">+ 과제 추가</button>
    <button onclick="signOut()" style="border:none; background:none; color:#aaa; cursor:pointer">로그아웃</button>
  </div>
</div>

<div class="sheet-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:110px">TF 구분</th>
        <th style="width:200px">과제</th>
        <th>필요사항</th>
        <th style="width:110px">효율화</th>
        <th style="width:230px">PIPE LINE</th>
        <th style="width:180px">운영참조</th>
        <th style="width:150px">참고자료</th>
        <th style="width:100px">진행</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="admin-modal" onclick="if(event.target==this) closeAdmin()">
  <div class="modal-content">
    <h3>🛡️ 권한 설정</h3><br>
    <div style="display:flex; gap:5px">
      <input id="new-user-email" placeholder="이메일" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:6px">
      <select id="new-user-role" style="padding:8px; border:1px solid #ddd; border-radius:6px">
        <option value="editor">편집자</option>
        <option value="viewer">뷰어</option>
      </select>
      <button onclick="addUser()" class="btn-primary">추가</button>
    </div><br>
    <div id="allowed-users-list"></div>
    <button onclick="closeAdmin()" style="width:100%; padding:10px; margin-top:10px; border:none; border-radius:8px; cursor:pointer">닫기</button>
  </div>
</div>

<div id="sync-indicator">💾 실시간 동기화 중...</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBwIfEoO8IWObPJ7iYocWMZ7efDDeCt46w",
  authDomain: "lfsq-md.firebaseapp.com",
  databaseURL: "https://lfsq-md-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "lfsq-md",
  storageBucket: "lfsq-md.appspot.com",
  messagingSenderId: "869210794054",
  appId: "1:869210794054:web:e65fc58d5882a49f154247"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const ADMINS = ['hara.jang@linefriends.com', 'janghara.in@gmail.com'];

let userRole = 'viewer'; 
let tasks = [];
let dragSourceEl = null;

// ── Auth & Init ──
function signIn() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function signOut() { auth.signOut().then(() => location.reload()); }

auth.onAuthStateChanged(async user => {
  if (user) {
    const snap = await db.ref('settings/allowedUsers').get();
    const allowed = snap.val() || {};
    const email = user.email;
    const isAdmin = ADMINS.includes(email);
    const found = Object.values(allowed).find(u => u.email === email);

    if (!isAdmin && !found) {
      document.getElementById('denied-msg').style.display = 'block';
      setTimeout(() => auth.signOut(), 2000);
      return;
    }

    userRole = isAdmin ? 'admin' : (found ? found.role : 'viewer');
    if (userRole !== 'viewer') document.body.classList.add('can-edit');
    if (userRole === 'admin') document.getElementById('admin-btn').style.display = 'block';

    document.getElementById('auth-shield').classList.add('hidden');
    db.ref('presence/' + user.uid).set({ photo: user.photoURL, name: user.displayName });
    db.ref('presence/' + user.uid).onDisconnect().remove();
    startSync();
  }
});

function startSync() {
  db.ref('lfsq_tasks').on('value', snap => {
    const data = snap.val();
    tasks = data ? Object.values(data) : [];
    renderUI();
  });
  db.ref('settings/mascot').on('value', snap => document.getElementById('display-mascot').src = snap.val() || "");
  db.ref('presence').on('value', snap => {
    const p = snap.val() || {};
    document.getElementById('presence-list').innerHTML = Object.values(p).map(u => `<img src="${u.photo}" class="presence-avatar">`).join('');
  });
}

// ── UI & Drag Event ──
function renderUI() {
  const canEdit = userRole !== 'viewer';
  
  // 정렬: 완료 여부 최우선 -> 그 안에서 사용자가 지정한 order 순서
  const sorted = [...tasks].sort((a, b) => {
    if (a.status === '완료' && b.status !== '완료') return 1;
    if (a.status !== '완료' && b.status === '완료') return -1;
    return (a.order || 0) - (b.order || 0);
  });

  document.getElementById('tbody').innerHTML = sorted.map(t => {
    const isDone = t.status === '완료';
    return `
      <tr class="${isDone ? 'status-done' : ''} ${t.tfMode==='tf'?'tf-on':t.tfMode==='team'?'team-on':''}" 
          id="row-${t.id}" data-id="${t.id}" 
          ${canEdit ? `draggable="true" ondragstart="handleDragStart(event)" ondragover="handleDragOver(event)" ondragenter="handleDragEnter(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)" ondragend="handleDragEnd(event)"` : ''}>
        <td>
          <div class="tf-group">
            <div class="tf-btn ${t.tfMode==='tf'?'tf-active':''}" ${canEdit?`onclick="updateField(${t.id}, 'tfMode', 'tf')"`:''}>TF 요청</div>
            <div class="tf-btn ${t.tfMode==='team'?'team-active':''}" ${canEdit?`onclick="updateField(${t.id}, 'tfMode', 'team')"`:''}>팀 자체구축</div>
          </div>
        </td>
        <td class="task-name" ${canEdit?`contenteditable="true" onblur="updateField(${t.id}, 'title', this.innerText)"`:''}>${t.title || ''}</td>
        <td>
          ${(t.requirements || []).map((r, i) => {
            const checked = (t.reqChecks || []).includes(i);
            return `<div class="req-item">
              <div class="req-cb ${checked?'checked':''}" ${canEdit?`onclick="toggleReq(${t.id}, ${i})"`:''}></div>
              <span class="req-text ${checked?'done':''}" ${canEdit?`contenteditable="true" onblur="editReq(${t.id}, ${i}, this.innerText)"`:''}>${r}</span>
              ${canEdit?`<span style="cursor:pointer;color:red;font-size:10px;margin-left:5px" onclick="deleteReq(${t.id}, ${i})">✕</span>`:''}
            </div>`;
          }).join('')}
          ${canEdit?`<button onclick="addReq(${t.id})" style="font-size:10px; color:#3b7dd8; border:none; background:none; margin-top:5px; cursor:pointer">+ 항목 추가</button>`:''}
        </td>
        <td>
          <span class="persp-toggle" ${canEdit?`onclick="togglePersp(${t.id}, '${t.perspective || ''}')"`:''}>
            ${t.perspective==='company'?'<b>전사관점</b>':t.perspective==='team'?'<b>팀 관점</b>':t.perspective==='personal'?'<b>개인 관점</b>':'— 선택 —'}
          </span>
        </td>
        <td>
          <div class="pipe-group">
            ${['BM','ONLINE','OFFLINE','LOGIS','MKT','CX'].map(p => `
              <div class="pipe-item ${(t.pipeline||[]).includes(p)?'active':''}" ${canEdit?`onclick="togglePipe(${t.id}, '${p}')"`:''}>${p}</div>
            `).join('')}
          </div>
        </td>
        <td>
          <input style="width:100%; border:none; background:transparent; font-size:11px;" value="${t.links || ''}" ${canEdit?`onchange="updateField(${t.id}, 'links', this.value)"`:'disabled'} placeholder="링크">
          ${t.links ? `<br><a href="${t.links}" target="_blank" style="color:#3b7dd8;font-size:10px">이동 ↗</a>` : ''}
        </td>
        <td>
          ${canEdit ? `<label style="cursor:pointer;font-size:11px;background:#eee;padding:2px 5px;border-radius:4px">📎 업로드<input type="file" style="display:none" onchange="uploadFile(${t.id}, this.files[0])"></label>` : ''}
          <div style="font-size:10px; color:#aaa; margin-top:4px;">${(t.files || []).length}개 파일</div>
        </td>
        <td>
          <select onchange="updateField(${t.id}, 'status', this.value)" ${canEdit?'':'disabled'}>
            ${['검토','진행','완료'].map(s => `<option value="${s}" ${t.status === s ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
          ${canEdit ? `<button onclick="deleteTask(${t.id})" style="border:none; background:none; cursor:pointer; margin-left:5px">🗑</button>` : ''}
        </td>
      </tr>`;
  }).join('');
}

// ── Drag & Drop Handlers ──
function handleDragStart(e) {
  dragSourceEl = e.currentTarget;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}
function handleDragOver(e) { e.preventDefault(); return false; }
function handleDragEnter(e) { e.currentTarget.classList.add('over'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('over'); }
function handleDragEnd(e) {
  const rows = document.querySelectorAll('tbody tr');
  rows.forEach(row => { row.classList.remove('dragging', 'over'); });
}

async function handleDrop(e) {
  e.stopPropagation();
  const targetRow = e.currentTarget;
  if (dragSourceEl !== targetRow) {
    showSync();
    // 화면상의 현재 순서를 가져와서 order 필드 업데이트
    const tbody = document.getElementById('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'));
    const sourceIdx = rows.indexOf(dragSourceEl);
    const targetIdx = rows.indexOf(targetRow);
    
    // 배열에서 순서 변경
    rows.splice(sourceIdx, 1);
    rows.splice(targetIdx, 0, dragSourceEl);

    // 새 순서에 맞춰 전체 tasks의 order 업데이트
    const updates = {};
    rows.forEach((row, index) => {
      const id = row.getAttribute('data-id');
      updates[`task_${id}/order`] = index;
    });
    await db.ref('lfsq_tasks').update(updates);
  }
  return false;
}

// ── Data Actions ──
function updateField(id, field, val) {
  showSync();
  db.ref(`lfsq_tasks/task_${id}/${field}`).set(val);
}
function togglePersp(id, current) {
  const seq = ['', 'company', 'team', 'personal'];
  const next = seq[(seq.indexOf(current) + 1) % seq.length];
  updateField(id, 'perspective', next);
}
function togglePipe(id, p) {
  const t = tasks.find(x => x.id === id);
  let arr = t.pipeline || [];
  arr = arr.includes(p) ? arr.filter(i => i !== p) : [...arr, p];
  updateField(id, 'pipeline', arr);
}
function toggleReq(id, idx) {
  const t = tasks.find(x => x.id === id);
  let arr = t.reqChecks || [];
  arr = arr.includes(idx) ? arr.filter(i => i !== idx) : [...arr, idx];
  updateField(id, 'reqChecks', arr);
}
function addReq(id) {
  const val = prompt("항목 입력:");
  if (!val) return;
  const t = tasks.find(x => x.id === id);
  const arr = t.requirements || [];
  updateField(id, 'requirements', [...arr, val]);
}
function editReq(id, idx, text) {
  const t = tasks.find(x => x.id === id);
  const arr = [...t.requirements];
  arr[idx] = text;
  updateField(id, 'requirements', arr);
}
function deleteReq(id, idx) {
  const t = tasks.find(x => x.id === id);
  const arr = t.requirements.filter((_, i) => i !== idx);
  db.ref(`lfsq_tasks/task_${id}/requirements`).set(arr);
}
function uploadFile(id, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const t = tasks.find(x => x.id === id);
    const arr = t.files || [];
    updateField(id, 'files', [...arr, { name: file.name, data: e.target.result }]);
  };
  reader.readAsDataURL(file);
}
function addNewTask() {
  const title = prompt("새 과제명:");
  if (!title) return;
  const id = Date.now();
  // 가장 큰 order 값 찾기
  const maxOrder = tasks.length > 0 ? Math.max(...tasks.map(t => t.order || 0)) : 0;
  db.ref('lfsq_tasks/task_' + id).set({ 
    id, title, status: '검토', tfMode: 'none', pipeline: [], requirements: [], order: maxOrder + 1 
  });
}
function deleteTask(id) { if (confirm("삭제할까요?")) db.ref('lfsq_tasks/task_' + id).remove(); }
function uploadMascot(file) {
  const reader = new FileReader();
  reader.onload = e => db.ref('settings/mascot').set(e.target.result);
  reader.readAsDataURL(file);
}

// ── Admin ──
function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; refreshUserList(); }
function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
async function addUser() {
  const email = document.getElementById('new-user-email').value.trim();
  const role = document.getElementById('new-user-role').value;
  if(!email.includes('@')) return alert('이메일 확인');
  const id = btoa(email).replace(/=/g, "");
  await db.ref('settings/allowedUsers/' + id).set({ email, role });
  document.getElementById('new-user-email').value = "";
  refreshUserList();
}
async function refreshUserList() {
  const snap = await db.ref('settings/allowedUsers').get();
  const users = snap.val() || {};
  document.getElementById('allowed-users-list').innerHTML = Object.entries(users).map(([id, u]) => `
    <div class="user-row"><span>${u.email} (${u.role})</span><button onclick="removeUser('${id}')" style="color:red;border:none;background:none;cursor:pointer">삭제</button></div>
  `).join('');
}
async function removeUser(id) { if(confirm('삭제?')) { await db.ref('settings/allowedUsers/' + id).remove(); refreshUserList(); } }
function showSync() { document.getElementById('sync-indicator').style.display = 'block'; setTimeout(() => document.getElementById('sync-indicator').style.display = 'none', 1000); }
</script>
</body>
</html>
