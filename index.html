<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LFSQ MD팀 AI 업무 효율화</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', 'Nanum Gothic', sans-serif;
  background: #f5f6fa;
  color: #1a1a2e;
  font-size: 13px;
}

/* ── TOP BAR ── */
.top-mascot {
  height: 52px;
  width: 52px;
  object-fit: cover;
  object-position: top;
  border-radius: 50%;
  background: transparent;
  flex-shrink: 0;
}
.top-bar {
  background: #fff;
  border-bottom: 1px solid #ebebf0;
  padding: 0 20px 0 16px;
  height: 66px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 8px rgba(0,0,0,.06);
}
.top-left { display: flex; align-items: center; gap: 12px; }
.top-badge {
  background: #f0f0f0;
  color: #2a2a2a;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.top-title { font-size: 15px; font-weight: 700; color: #111; letter-spacing: -0.3px; }
.top-sub { font-size: 11px; color: #aaa; margin-top: 1px; }
.add-btn {
  background: #2a2a2a;
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.add-btn:hover { background: #111111; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.18); }
.add-btn:active { transform: translateY(0); }

/* ── SHEET WRAP ── */
.sheet-wrap {
  overflow-x: auto;
  padding: 20px 24px 60px;
}

/* ── TABLE ── */
table {
  border-collapse: separate;
  border-spacing: 0;
  min-width: 1400px;
  width: 100%;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,.06);
}
thead th {
  background: #2a2a2a;
  border-bottom: 2px solid #1a1a1a;
  border-right: 1px solid #1a1a1a;
  padding: 12px 14px;
  text-align: left;
  font-weight: 700;
  font-size: 11px;
  color: #fff;
  white-space: nowrap;
  letter-spacing: 0.6px;
  text-transform: uppercase;
}
thead th:last-child { border-right: none; }
thead th.col-tf     { width: 80px; text-align: center; }
thead th.col-task   { width: 155px; min-width: 130px; }
thead th.col-req    { width: 300px; min-width: 240px; }
thead th.col-persp  { width: 150px; min-width: 130px; }
thead th.col-pipe   { width: 260px; min-width: 210px; }
thead th.col-link   { width: 200px; min-width: 170px; }
thead th.col-files  { width: 180px; min-width: 150px; }
thead th.col-status { width: 110px; }

tbody tr { vertical-align: top; transition: background .12s; }
tbody tr:not(:last-child) td { border-bottom: 1px solid #f3f3f8; }
tbody tr:hover td { background: #fafbff; }
tbody td {
  border-right: 1px solid #f3f3f8;
  padding: 12px 14px;
  vertical-align: top;
}
tbody td:last-child { border-right: none; }

/* ── TF COLUMN ── */
td.tf-cell { vertical-align: middle; text-align: center; padding: 8px 6px; }
.tf-group { display: flex; flex-direction: column; gap: 5px; align-items: center; }
.tf-btn {
  width: 68px; height: 28px;
  border: 1.5px solid #e8e8f0;
  border-radius: 8px;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #ccc;
  transition: all .15s; background: #fafafa;
  font-family: inherit; letter-spacing: 0.2px;
  white-space: nowrap;
}
.tf-btn:hover { border-color: #bbb; color: #888; background: #f3f3f8; }
.tf-btn.tf-active {
  background: #2a2a2a; border-color: #2a2a2a; color: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
}
.tf-btn.team-active {
  background: #3b7dd8; border-color: #3b7dd8; color: #fff;
  box-shadow: 0 2px 6px rgba(59,125,216,.3);
}

tr.tf-on td { background: #fafafa; }
tr.tf-on td.task-name { background: #f4f4f4; color: #111111; }
tr.team-on td { background: #fdfeff; }
tr.team-on td.task-name { background: #eff6ff; color: #1e4fa0; }

td.task-name {
  font-weight: 700;
  font-size: 13px;
  color: #111;
  background: #fafafa;
  vertical-align: middle;
  cursor: text;
}
td.task-name:hover { background: #f3f4f8; }
td.task-name:focus { outline: none; background: #e8f4fd; }

/* ── REQUIREMENTS — 가시성 강화 ── */
.req-list { display: flex; flex-direction: column; gap: 6px; }
.req-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 8px;
  border-radius: 8px;
  background: #f8f9fc;
  border: 1px solid #eef0f7;
  transition: border-color .12s;
}
.req-item:hover { border-color: #d0d5ea; }
.req-cb {
  width: 16px; height: 16px; flex-shrink: 0;
  border: 2px solid #c8cce0; border-radius: 5px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
  transition: all .12s; background: #fff;
}
.req-cb:hover { border-color: #2a2a2a; }
.req-cb.checked { background: #2a2a2a; border-color: #2a2a2a; }
.req-cb.checked::after { content: '✓'; color: #fff; font-size: 10px; font-weight: 700; line-height: 1; }
.req-text {
  font-size: 12.5px;
  color: #2a2a3e;
  line-height: 1.6;
  cursor: text;
  font-weight: 500;
  flex: 1;
  min-width: 0;
}
.req-text:hover { color: #111; }
.req-text.done { text-decoration: line-through; color: #bbb; font-weight: 400; }
.req-text[contenteditable="true"] {
  outline: none;
  background: #e8f4fd;
  border-radius: 4px;
  padding: 1px 4px;
}
.small-add-btn {
  background: none;
  border: 1.5px dashed #dde0ee; border-radius: 8px;
  padding: 5px 12px; font-size: 11px; color: #bbb;
  cursor: pointer; margin-top: 6px; transition: all .12s;
  font-family: inherit; font-weight: 600;
  width: 100%;
}
.small-add-btn:hover { border-color: #2a2a2a; color: #2a2a2a; background: #f4f4f4; }

/* ── PERSPECTIVE select ── */
.persp-select {
  width: 100%; padding: 6px 8px;
  border: none; border-radius: 6px;
  font-size: 12.5px; font-family: inherit;
  color: #aaa; background: transparent; cursor: pointer; outline: none;
  transition: color .12s;
  appearance: none;
}
.persp-select:focus { color: #333; }
.persp-select.selected {
  color: #1a1a2e;
  font-weight: 700;
  font-size: 13px;
}

/* ── PIPELINE pills ── */
.pipe-group { display: flex; flex-wrap: wrap; gap: 5px; }
.pipe-item {
  cursor: pointer; user-select: none;
  padding: 4px 10px; border-radius: 20px;
  border: 1.5px solid #e8e8f0;
  transition: all .15s;
  background: #fafafa;
  font-size: 11px;
  color: #ccc;
  font-weight: 700;
  letter-spacing: 0.2px;
}
.pipe-item:hover { border-color: #bbb; color: #888; background: #f3f3f8; }
.pipe-item.active {
  border-color: #2a2a2a;
  background: #2a2a2a;
  color: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.12);
}

/* ── LINKS ── */
.link-list { display: flex; flex-direction: column; gap: 5px; }
.link-row {
  display: flex; align-items: center; gap: 5px;
  background: #f8f9fc; border: 1.5px solid #eef0f7;
  border-radius: 9px; padding: 5px 9px;
  transition: border-color .12s;
}
.link-row:hover { border-color: #d0d5ea; }
.link-inp {
  flex: 1; background: none; border: none; outline: none;
  font-size: 11px; color: #333; font-family: inherit; min-width: 0;
}
.link-inp::placeholder { color: #ccc; }
.link-open {
  background: none; border: none; cursor: pointer;
  font-size: 11px; color: #2a2a2a; white-space: nowrap;
  flex-shrink: 0; transition: color .1s; font-family: inherit; font-weight: 600;
}
.link-open:hover { color: #111; }
.link-del {
  background: none; border: none; cursor: pointer;
  font-size: 12px; color: #ddd; transition: color .1s; flex-shrink: 0;
}
.link-del:hover { color: #e53935; }

/* ── FILE ZONE ── */
.file-zone {
  border: 1.5px dashed #dde0ee; border-radius: 10px;
  padding: 10px; cursor: pointer; position: relative;
  transition: all .15s; text-align: center;
  color: #ccc; font-size: 11px; line-height: 1.8;
  background: #fafafa; font-weight: 600;
}
.file-zone:hover { border-color: #2a2a2a; color: #2a2a2a; background: #f4f4f4; }
.file-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.file-list-inner { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
.file-item {
  display: flex; align-items: center; gap: 5px;
  background: #f3f4f8; border-radius: 7px; padding: 5px 8px;
}
.file-name { flex: 1; font-size: 11px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.file-link { font-size: 11px; color: #2a2a2a; text-decoration: none; flex-shrink: 0; font-family: inherit; font-weight: 600; }
.file-link:hover { color: #111; text-decoration: underline; }
.file-del { background: none; border: none; cursor: pointer; font-size: 12px; color: #ccc; transition: color .1s; }
.file-del:hover { color: #e53935; }

/* ── STATUS SELECT ── */
.status-sel {
  width: 100%; padding: 7px 10px;
  border: 1.5px solid #e8e8f0; border-radius: 9px;
  font-size: 12px; font-family: inherit;
  color: #555; background: #fafafa; cursor: pointer; outline: none;
  transition: border-color .12s; font-weight: 500;
}
.status-sel:focus { border-color: #2a2a2a; }
.del-row-btn {
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: #e0e0e8; display: block;
  margin: 7px auto 0; transition: color .1s;
}
.del-row-btn:hover { color: #e53935; }

/* ── ADD FORM ── */
.add-row-form {
  background: #fff; border: 1.5px solid #ebebf5;
  border-radius: 14px; padding: 18px 22px;
  margin: 14px 0 0;
  display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
  box-shadow: 0 2px 12px rgba(0,0,0,.05);
}
.add-field { display: flex; flex-direction: column; gap: 5px; }
.add-field label { font-size: 11px; color: #aaa; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
.add-input {
  border: 1.5px solid #e8e8f0; border-radius: 9px;
  padding: 8px 12px; font-size: 13px;
  font-family: inherit; font-weight: 500;
  color: #222; outline: none; transition: border-color .12s; background: #fafafa;
}
.add-input:focus { border-color: #2a2a2a; background: #fff; }
.cancel-btn {
  background: none; border: 1.5px solid #e8e8f0; padding: 8px 16px;
  border-radius: 9px; cursor: pointer; font-size: 13px;
  font-family: inherit; color: #aaa; transition: all .12s; font-weight: 500;
}
.cancel-btn:hover { border-color: #bbb; color: #555; }

::-webkit-scrollbar { height: 5px; width: 5px; }
::-webkit-scrollbar-track { background: #f0f0f5; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #d0d0de; border-radius: 10px; }
</style>
</head>

const PERSP_OPTS = [
  { k: '', l: '— 선택 —' },
  { k: 'company',  l: '전사관점' },
  { k: 'team',     l: '팀 관점' },
  { k: 'personal', l: '개인 관점' }
];

let tasks = [
  { id:1, title:'DASH Board 구축',
    requirements:['출시계획 / Allocation 시트 / 입고현황 / 물량계획 가시화','ㄴ 주요팝업요약 / 캘린더','ㄴ Raw데이터 직접 수정 및 엑셀 업/다운로드 필요'],
    reqChecks:[],
    perspective:'company',
    tf:true, tfMode:'tf',
    pipeline:['BM','ONLINE','OFFLINE','ON/OFF','LOGIS','MKT','CX'],
    links:['https://docs.google.com/spreadsheets/d/1aSeKoMEBjDTkAJTQUg6IRUEDawDTppq1TnCuVwGYN-8/edit?gid=1177430519#gid=1177430519'],
    files:[], status:'검토' },
  { id:2, title:'판매 데이터 기반 수요 예측',
    requirements:['(수요) 판매 데이터 분석 편의성 → 수요예측에 활용','(재발주) 소진예상 재고 리오더 알림'],
    reqChecks:[],
    perspective:'company',
    tf:false, tfMode:'none', pipeline:['BM','ON/OFF'],
    links:[], files:[], status:'검토' },
  { id:3, title:'단순 시스템 업무 편의',
    requirements:['자재코드 등록 양식 효율화','정보고시(데이터센터) 등록 양식 효율화'],
    reqChecks:[],
    perspective:'team',
    tf:true, tfMode:'team', pipeline:[],
    links:[], files:[], status:'검토' },
  { id:4, title:'기획 / 영업',
    requirements:['프로젝트 기획안 (ex: 기획보고, 킥오프, 등)'],
    reqChecks:[],
    perspective:'personal',
    tf:false, tfMode:'none', pipeline:[],
    links:[], files:[], status:'검토' }
];

function sortedTasks() {
  const rank = t => t.tfMode==='tf' ? 2 : t.tfMode==='team' ? 1 : 0;
  return [...tasks].sort((a,b) => rank(b) - rank(a));
}

function render() {
  document.getElementById('tbody').innerHTML = sortedTasks().map(rowHtml).join('');
  tasks.forEach(t => attachDrop(t.id));
  save();
}

function rowHtml(t) {
  const reqs = (t.requirements||[]).map((r,ri) => {
    const ck = (t.reqChecks||[]).includes(ri);
    return `<div class="req-item">
      <div class="req-cb${ck?' checked':''}" onclick="toggleReq(${t.id},${ri},this)"></div>
      <span class="req-text${ck?' done':''}" contenteditable="true"
        onblur="updateReqText(${t.id},${ri},this)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
      >${esc(r)}</span>
    </div>`;
  }).join('');

  const perspOpts = PERSP_OPTS.map(p =>
    `<option value="${p.k}"${t.perspective===p.k?' selected':''}>${p.l}</option>`
  ).join('');
  const perspHasVal = t.perspective && t.perspective !== '';

  const pipes = PIPES.map(p => {
    const active = t.pipeline.includes(p);
    return `<div class="pipe-item${active?' active':''}" onclick="togglePipe(${t.id},'${p}',this)">${p}</div>`;
  }).join('');

  const links = (t.links||[]).map((l,li) => linkRowHtml(t.id,l,li)).join('');
  const fileItems = (t.files||[]).map((f,fi) => fileItemHtml(t.id,f,fi)).join('');
  const opts = STATUSES.map(s=>`<option${s===t.status?' selected':''}>${s}</option>`).join('');

  const trClass = t.tfMode==='tf' ? 'tf-on' : t.tfMode==='team' ? 'team-on' : '';
  return `<tr id="row-${t.id}" class="${trClass}">
    <td class="tf-cell">
      <div class="tf-group">
        <div class="tf-btn${t.tfMode==='tf'?' tf-active':''}" onclick="setTF(${t.id},'tf',this)">TF 요청</div>
        <div class="tf-btn${t.tfMode==='team'?' team-active':''}" onclick="setTF(${t.id},'team',this)">팀 자체구축</div>
      </div>
    </td>
    <td class="task-name" contenteditable="true"
      onblur="updateTitle(${t.id},this)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
    >${esc(t.title)}</td>
    <td>
      <div class="req-list" id="reqs-${t.id}">${reqs}</div>
      <button class="small-add-btn" onclick="addReq(${t.id})">+ 항목 추가</button>
    </td>
    <td>
      <select class="persp-select${perspHasVal?' selected':''}" onchange="updatePersp(${t.id},this)">
        ${perspOpts}
      </select>
    </td>
    <td><div class="pipe-group" id="pipes-${t.id}">${pipes}</div></td>
    <td>
      <div class="link-list" id="links-${t.id}">${links}</div>
      <button class="small-add-btn" onclick="addLink(${t.id})">+ 링크 추가</button>
    </td>
    <td>
      <div class="file-zone" id="fzone-${t.id}">
        <input type="file" multiple onchange="handleFiles(${t.id},this.files)">
        📎 업로드
      </div>
      <div class="file-list-inner" id="files-${t.id}">${fileItems}</div>
    </td>
    <td>
      <select class="status-sel" onchange="updateStatus(${t.id},this.value)">${opts}</select>
      <button class="del-row-btn" onclick="delTask(${t.id})" title="삭제">🗑</button>
    </td>
  </tr>`;
}

function linkRowHtml(tid, url, li) {
  return `<div class="link-row" id="lr-${tid}-${li}">
    <input class="link-inp" value="${esc(url)}" placeholder="https://..." onchange="updateLink(${tid},${li},this.value)">
    ${url ? `<button class="link-open" onclick="window.open('${esc(url)}','_blank')">열기↗</button>` : ''}
    <button class="link-del" onclick="delLink(${tid},${li})">✕</button>
  </div>`;
}

function fileItemHtml(tid, f, fi) {
  const isHtml = /\.html?$/i.test(f.name||'');
  return `<div class="file-item" id="fi-${tid}-${fi}">
    <span class="file-name" title="${esc(f.name)}">${isHtml?'🌐':'📄'} ${esc(f.name)}</span>
    ${f.url ? `<a class="file-link" href="${f.url}" target="_blank">${isHtml?'열기↗':'보기↗'}</a>` : ''}
    <button class="file-del" onclick="delFile(${tid},${fi})">✕</button>
  </div>`;
}

function attachDrop(tid) {
  const dz = document.getElementById(`fzone-${tid}`);
  if (!dz) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor='#2a2a2a'; });
  dz.addEventListener('dragleave', () => dz.style.borderColor='');
  dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor=''; handleFiles(tid, e.dataTransfer.files); });
}

function toggleReq(tid, ri, el) {
  const t = tasks.find(x=>x.id===tid);
  const i = t.reqChecks.indexOf(ri);
  if (i===-1) t.reqChecks.push(ri); else t.reqChecks.splice(i,1);
  el.classList.toggle('checked');
  el.nextElementSibling.classList.toggle('done');
  save();
}

function updateReqText(tid, ri, el) {
  const t = tasks.find(x=>x.id===tid);
  const newText = el.innerText.trim();
  if (newText) { t.requirements[ri] = newText; save(); }
  else { el.innerText = t.requirements[ri]; }
}

function updateTitle(tid, el) {
  const t = tasks.find(x=>x.id===tid);
  const newText = el.innerText.trim();
  if (newText) { t.title = newText; save(); }
  else { el.innerText = t.title; }
}

function addReq(tid) {
  const txt = prompt('필요사항을 입력하세요:');
  if (!txt||!txt.trim()) return;
  const t = tasks.find(x=>x.id===tid);
  const ri = t.requirements.length;
  t.requirements.push(txt.trim());
  const cont = document.getElementById(`reqs-${tid}`);
  const d = document.createElement('div');
  d.innerHTML = `<div class="req-item">
    <div class="req-cb" onclick="toggleReq(${tid},${ri},this)"></div>
    <span class="req-text" contenteditable="true"
      onblur="updateReqText(${tid},${ri},this)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
    >${esc(txt.trim())}</span>
  </div>`;
  cont.appendChild(d.firstElementChild);
  save();
}

function updatePersp(tid, sel) {
  const t = tasks.find(x=>x.id===tid);
  t.perspective = sel.value;
  sel.classList.toggle('selected', sel.value !== '');
  save();
}

function setTF(tid, mode, el) {
  const t = tasks.find(x=>x.id===tid);
  // 같은 거 누르면 해제
  t.tfMode = (t.tfMode === mode) ? 'none' : mode;
  t.tf = (t.tfMode === 'tf'); // 하위 호환
  save(); render();
}

function togglePipe(tid, p, el) {
  const t = tasks.find(x=>x.id===tid);
  const i = t.pipeline.indexOf(p);
  if (i===-1) t.pipeline.push(p); else t.pipeline.splice(i,1);
  el.classList.toggle('active', t.pipeline.includes(p));
  save();
}

function addLink(tid) {
  const t = tasks.find(x=>x.id===tid);
  const li = t.links.length;
  t.links.push('');
  const cont = document.getElementById(`links-${tid}`);
  const d = document.createElement('div');
  d.innerHTML = linkRowHtml(tid, '', li);
  cont.appendChild(d.firstElementChild);
  save();
}

function updateLink(tid, li, val) {
  const t = tasks.find(x=>x.id===tid);
  t.links[li] = val;
  const row = document.getElementById(`lr-${tid}-${li}`);
  if (row) {
    let ob = row.querySelector('.link-open');
    if (val && !ob) {
      const b = document.createElement('button');
      b.className = 'link-open'; b.textContent = '열기↗';
      b.onclick = () => window.open(val,'_blank');
      row.insertBefore(b, row.querySelector('.link-del'));
    } else if (val && ob) { ob.onclick = () => window.open(val,'_blank'); }
    else if (!val && ob) { ob.remove(); }
  }
  save();
}

function delLink(tid, li) {
  const t = tasks.find(x=>x.id===tid);
  t.links.splice(li,1);
  document.getElementById(`lr-${tid}-${li}`)?.remove();
  save();
}

function handleFiles(tid, fileList) {
  const t = tasks.find(x=>x.id===tid);
  Array.from(fileList).forEach(f => {
    const url = URL.createObjectURL(f);
    const fi = t.files.length;
    t.files.push({ name:f.name, url, type:f.type });
    const cont = document.getElementById(`files-${tid}`);
    const d = document.createElement('div');
    d.innerHTML = fileItemHtml(tid, t.files[fi], fi);
    cont.appendChild(d.firstElementChild);
  });
}

function delFile(tid, fi) {
  const t = tasks.find(x=>x.id===tid);
  t.files.splice(fi,1);
  document.getElementById(`fi-${tid}-${fi}`)?.remove();
}

function updateStatus(tid, val) {
  tasks.find(x=>x.id===tid).status = val;
  save();
}

function delTask(tid) {
  if (!confirm('이 과제를 삭제할까요?')) return;
  tasks = tasks.filter(x=>x.id!==tid);
  render();
}

function showAdd() { document.getElementById('add-form').style.display='block'; document.getElementById('f-title').focus(); }
function hideAdd() { document.getElementById('add-form').style.display='none'; }

function confirmAdd() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('과제명을 입력해주세요!'); return; }
  const req = document.getElementById('f-req').value.trim();
  const newId = tasks.length ? Math.max(...tasks.map(x=>x.id))+1 : 1;
  tasks.push({ id:newId, title, requirements:req?[req]:[], reqChecks:[], perspective:'', tf:false, tfMode:'none', pipeline:[], links:[], files:[], status:'검토' });
  document.getElementById('f-title').value='';
  document.getElementById('f-req').value='';
  hideAdd();
  render();
  setTimeout(() => document.getElementById(`row-${newId}`)?.scrollIntoView({behavior:'smooth',block:'center'}), 100);
}

function save() {
  try { localStorage.setItem('lfsq_tasks', JSON.stringify(tasks.map(t=>({...t, files:t.files.map(f=>({name:f.name,type:f.type}))})))); } catch(e){}
}
function load() {
  try {
    const r = localStorage.getItem('lfsq_tasks');
    if (r) {
      const parsed = JSON.parse(r).map(t => {
        let persp = t.perspective;
        if (typeof persp === 'object' && persp !== null) {
          persp = Object.keys(persp).find(k => persp[k]) || '';
        }
        const tfMode = t.tfMode || (t.tf ? 'tf' : 'none'); return {...t, tfMode, perspective: persp, files:(t.files||[]).map(f=>({...f,url:null}))};
      });
      tasks = parsed;
    }
  } catch(e){}
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
render();
</script>
</body>
</html>
