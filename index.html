<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LFSQ MD팀 AI 업무 효율화</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', sans-serif; background: #f5f6fa; color: #1a1a2e; font-size: 13px; overflow-x: hidden; }

/* ── AUTH SHIELD (로그인 전 화면 차단) ── */
#auth-shield { position: fixed; inset: 0; z-index: 10000; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#auth-shield.hidden { display: none; }
.login-card { text-align: center; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 350px; }
.google-login-btn { 
    width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; 
    cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px;
}

/* ── TOP BAR ── */
.top-bar { background: #fff; border-bottom: 1px solid #ebebf0; padding: 0 20px; height: 66px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
.top-left { display: flex; align-items: center; gap: 12px; }
.top-mascot { height: 50px; width: 50px; object-fit: cover; border-radius: 50%; cursor: pointer; border: 1px solid #eee; }
.top-title { font-size: 16px; font-weight: 700; color: #111; }

.top-right { display: flex; align-items: center; gap: 12px; }
.presence-list { display: flex; align-items: center; }
.presence-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; margin-left: -10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

/* 관리자 버튼 */
#admin-btn { display: none; background: #ff4d4f; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; }

/* ── TABLE & CONTENT ── */
.sheet-wrap { padding: 20px; }
table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 1300px; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,.06); }
thead th { background: #2a2a2a; color: #fff; padding: 12px; text-align: left; font-size: 11px; }
tbody td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
tr.status-done { background: #fafafa; opacity: 0.6; }

/* 권환별 UI 제어 */
.editor-only { display: none; }
body.can-edit .editor-only { display: inline-block; }

/* ── ADMIN MODAL ── */
#admin-modal { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; }
.modal-content { background: #fff; width: 500px; border-radius: 16px; padding: 25px; max-height: 80vh; overflow-y: auto; }
.security-item { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
.user-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }

/* 공통 버튼 */
.btn-primary { background: #2a2a2a; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body class="">

<div id="auth-shield">
  <div class="login-card">
    <h2 style="margin-bottom:10px">MD팀 업무 효율화</h2>
    <p style="color:#888; font-size:13px">서비스 이용을 위해 로그인이 필요합니다.</p>
    <button class="google-login-btn" onclick="signIn()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18"> Google로 시작하기
    </button>
    <div id="denied-msg" style="color:red; margin-top:15px; display:none; font-size:12px">접근 권한이 없습니다. 관리자에게 문의하세요.</div>
  </div>
</div>

<div class="top-bar">
  <div class="top-left">
    <img id="display-mascot" src="" class="top-mascot" onclick="if(userRole==='admin') document.getElementById('mascot-input').click()">
    <input type="file" id="mascot-input" style="display:none" accept="image/*" onchange="uploadMascot(this.files[0])">
    <div class="top-title">MD팀 AI 업무 효율화</div>
  </div>

  <div class="top-right">
    <div id="presence-list" class="presence-list"></div>
    <button id="admin-btn" onclick="openAdmin()">⚙️ 관리자 설정</button>
    <button class="editor-only btn-primary" onclick="showAdd()">+ 과제 추가</button>
    <button onclick="signOut()" style="border:none; background:none; color:#aaa; cursor:pointer">로그아웃</button>
  </div>
</div>

<div class="sheet-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:110px">TF 구분</th>
        <th style="width:200px">과제</th>
        <th>필요사항</th>
        <th style="width:100px">효율화</th>
        <th style="width:220px">PIPE LINE</th>
        <th style="width:180px">운영참조</th>
        <th style="width:150px">참고자료</th>
        <th style="width:100px">진행</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="admin-modal" onclick="if(event.target==this) closeAdmin()">
  <div class="modal-content">
    <h3 style="margin-bottom:20px">🛡️ 관리자 보안 설정</h3>
    
    <div class="security-item">
      <h4 style="margin-bottom:10px">접근 권한 관리 (구글 ID 기준)</h4>
      <div style="display:flex; gap:5px; margin-bottom:15px">
        <input id="new-user-email" placeholder="이메일 주소 입력" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:6px">
        <select id="new-user-role" style="padding:8px; border:1px solid #ddd; border-radius:6px">
          <option value="editor">편집자</option>
          <option value="viewer">뷰어</option>
        </select>
        <button onclick="addUser()" class="btn-primary">추가</button>
      </div>
      <div id="allowed-users-list"></div>
    </div>
    
    <button onclick="closeAdmin()" style="width:100%; padding:10px; border:none; border-radius:8px; cursor:pointer">닫기</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBwIfEoO8IWObPJ7iYocWMZ7efDDeCt46w",
  authDomain: "lfsq-md.firebaseapp.com",
  databaseURL: "https://lfsq-md-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "lfsq-md",
  storageBucket: "lfsq-md.appspot.com",
  messagingSenderId: "869210794054",
  appId: "1:869210794054:web:e65fc58d5882a49f154247"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const ADMINS = ['hara.jang@linefriends.com', 'janghara.in@gmail.com'];

let userRole = 'viewer'; // 기본 권한
let allowedUsers = {};

function signIn() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function signOut() { auth.signOut().then(() => location.reload()); }

auth.onAuthStateChanged(async user => {
  if (user) {
    // 1. 보안 리스트 가져오기
    const snapshot = await db.ref('settings/allowedUsers').get();
    allowedUsers = snapshot.val() || {};
    
    const email = user.email;
    const isAdmin = ADMINS.includes(email);
    const isAllowed = isAdmin || Object.keys(allowedUsers).some(key => allowedUsers[key].email === email);

    if (!isAllowed) {
      document.getElementById('denied-msg').style.display = 'block';
      setTimeout(() => auth.signOut(), 2000);
      return;
    }

    // 2. 권한 설정
    if (isAdmin) userRole = 'admin';
    else {
        const found = Object.values(allowedUsers).find(u => u.email === email);
        userRole = found ? found.role : 'viewer';
    }

    if (userRole === 'admin' || userRole === 'editor') document.body.classList.add('can-edit');
    if (userRole === 'admin') document.getElementById('admin-btn').style.display = 'block';

    document.getElementById('auth-shield').classList.add('hidden');
    initApp(user);
  }
});

function initApp(user) {
  startSync();
  // 접속자 표시
  db.ref('presence/' + user.uid).set({ photo: user.photoURL, name: user.displayName });
  db.ref('presence/' + user.uid).onDisconnect().remove();
}

function startSync() {
  db.ref('lfsq_tasks').on('value', snap => renderUI(snap.val()));
  db.ref('settings/mascot').on('value', snap => document.getElementById('display-mascot').src = snap.val() || "");
  db.ref('presence').on('value', snap => {
    const p = snap.val() || {};
    document.getElementById('presence-list').innerHTML = Object.values(p).map(u => `<img src="${u.photo}" class="presence-avatar">`).join('');
  });
}

// ── 관리자 기능 ──
function openAdmin() {
  document.getElementById('admin-modal').style.display = 'flex';
  refreshUserList();
}
function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

function addUser() {
  const email = document.getElementById('new-user-email').value.trim();
  const role = document.getElementById('new-user-role').value;
  if(!email.includes('@')) return alert('올바른 이메일을 입력하세요.');
  const id = btoa(email).replace(/=/g, "");
  db.ref('settings/allowedUsers/' + id).set({ email, role }).then(() => {
    document.getElementById('new-user-email').value = "";
    refreshUserList();
  });
}

function refreshUserList() {
  db.ref('settings/allowedUsers').get().then(snap => {
    const users = snap.val() || {};
    document.getElementById('allowed-users-list').innerHTML = Object.entries(users).map(([id, u]) => `
      <div class="user-row">
        <span>${u.email} <b>(${u.role})</b></span>
        <button onclick="removeUser('${id}')" style="color:red; border:none; background:none; cursor:pointer">삭제</button>
      </div>
    `).join('');
  });
}

function removeUser(id) {
  if(confirm('이 사용자의 접근 권한을 삭제할까요?')) db.ref('settings/allowedUsers/' + id).remove().then(() => refreshUserList());
}

// ── 데이터 렌더링 (기존 기능 유지) ──
function renderUI(data) {
  const tasks = data ? Object.values(data) : [];
  const sorted = tasks.sort((a,b) => (a.status === '완료' ? 1 : -1));
  
  document.getElementById('tbody').innerHTML = sorted.map(t => {
    const canEditAttr = (userRole === 'admin' || userRole === 'editor') ? `contenteditable="true" onblur="updateField(${t.id}, 'title', this.innerText)"` : '';
    return `
      <tr class="${t.status === '완료' ? 'status-done' : ''}">
        <td><div class="tf-btn ${t.tfMode==='tf'?'tf-active':''}">${t.tfMode==='tf'?'TF 요청':'일반'}</div></td>
        <td ${canEditAttr} class="task-name">${t.title}</td>
        <td>${(t.requirements || []).join(', ')}</td>
        <td><b>${t.perspective || '선택'}</b></td>
        <td>${(t.pipeline || []).join(' ')}</td>
        <td>${t.links ? `<a href="${t.links}" target="_blank">링크이동</a>` : '-'}</td>
        <td>파일 ${(t.files||[]).length}개</td>
        <td>${t.status}</td>
      </tr>
    `;
  }).join('');
}

function uploadMascot(file) {
  const reader = new FileReader();
  reader.onload = e => db.ref('settings/mascot').set(e.target.result);
  reader.readAsDataURL(file);
}

// 기타 과제 추가/삭제/수정 함수들은 기존 로직을 이어서 사용하시면 됩니다.
</script>
</body>
</html>
